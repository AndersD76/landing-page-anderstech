<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Verificar certificado — Anders Tech EAD</title>
<link rel="icon" href="/assets/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--navy:#0b1730;--red:#c5383c;--green:#16a34a;--ff-display:'Space Grotesk',sans-serif;--ff-mono:'JetBrains Mono',monospace}
body{font-family:var(--ff-display);background:#f4f5f7;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 24px}
.card{background:#fff;padding:40px;max-width:520px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,.08)}
.badge{width:64px;height:64px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
h1{font-size:22px;margin-bottom:16px;color:var(--navy)}
.detail{font-size:15px;color:#333;line-height:1.7;margin-bottom:20px}
.detail strong{color:var(--navy)}
.code{font-family:var(--ff-mono);font-size:14px;color:var(--red);background:#fef7f7;padding:8px 16px;display:inline-block;margin-bottom:20px}
a.btn{display:inline-block;padding:12px 24px;background:var(--red);color:#fff;text-decoration:none;font-weight:600;font-size:14px}
.not-found{color:#dc2626;font-size:16px}
.loading{color:#6b7280}
a.back{display:block;margin-top:20px;color:#6b7280;font-size:14px;text-decoration:none}
</style>
</head>
<body>
<div class="card" id="content"><p class="loading">Verificando certificado...</p></div>
<a href="/ead/cursos" class="back">&larr; Voltar aos cursos</a>

<script>
(function(){
  var code=window.location.pathname.split('/').pop();
  fetch('/ead/api/certificate/'+code+'?format=json').then(function(r){
    if(!r.ok)throw new Error();
    return r.json();
  }).then(function(c){
    var data=new Date(c.data).toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'});
    document.getElementById('content').innerHTML=
      '<div class="badge"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg></div>'
      +'<h1>Certificado válido</h1>'
      +'<div class="detail"><strong>'+c.nome+'</strong> concluiu o curso<br><strong>'+c.curso+'</strong><br>com carga horária de '+c.carga+'<br>em '+data+'</div>'
      +'<div class="code">'+c.code+'</div><br>'
      +'<a href="/ead/api/certificate/'+code+'" target="_blank" class="btn">Baixar PDF</a>';
  }).catch(function(){
    document.getElementById('content').innerHTML='<p class="not-found">Certificado não encontrado.<br>Verifique o código informado.</p>';
  });
})();
</script>
</body>
</html>
