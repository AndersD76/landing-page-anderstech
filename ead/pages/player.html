<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Player — Anders Tech EAD</title>
<link rel="icon" href="/assets/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--navy:#0b1730;--red:#c5383c;--bg:#f4f5f7;--card:#fff;--text:#1a1a2e;--mute:#6b7280;--green:#16a34a;--sidebar-w:320px;--ff-display:'Space Grotesk',sans-serif;--ff-mono:'JetBrains Mono',monospace}
body{font-family:var(--ff-display);background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column}

.player-header{background:var(--navy);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;z-index:10;flex-shrink:0}
.player-header .left{display:flex;align-items:center;gap:12px}
.player-header a.brand{color:#fff;text-decoration:none;font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px}
.player-header img{height:44px}
.player-header .course-title{color:rgba(255,255,255,.7);font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:300px}
.player-header .right a{color:rgba(255,255,255,.6);text-decoration:none;font-size:13px;padding:6px 12px}
.player-header .progress-bar{background:rgba(255,255,255,.15);height:3px;flex:1;max-width:200px;margin:0 12px}
.player-header .progress-fill{background:var(--green);height:100%;transition:width .3s}
.sidebar-toggle{display:none;background:none;border:none;color:#fff;cursor:pointer;padding:8px}

.player-body{display:flex;flex:1;overflow:hidden}

.sidebar{width:var(--sidebar-w);background:var(--card);border-right:1px solid #e5e7eb;overflow-y:auto;flex-shrink:0}
.sidebar .mod-header{padding:14px 16px;font-size:13px;font-weight:700;color:var(--navy);background:#f9fafb;border-bottom:1px solid #e5e7eb;cursor:pointer;display:flex;justify-content:space-between;align-items:center;user-select:none}
.sidebar .mod-header.open{background:#eef2ff}
.sidebar .mod-lessons{display:none}
.sidebar .mod-header.open+.mod-lessons{display:block}
.sidebar .lesson-link{display:flex;align-items:center;gap:10px;padding:10px 16px 10px 24px;font-size:13px;color:var(--text);text-decoration:none;border-bottom:1px solid #f5f5f5;transition:background .15s;cursor:pointer}
.sidebar .lesson-link:hover{background:#f0f4ff}
.sidebar .lesson-link.active{background:#eef2ff;color:var(--red);font-weight:600}
.sidebar .lesson-link .check{width:16px;height:16px;border:2px solid #ccc;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.sidebar .lesson-link .check.done{background:var(--green);border-color:var(--green)}
.sidebar .lesson-link .check.done::after{content:'';width:6px;height:6px;background:#fff;border-radius:50%}
.sidebar .lesson-link .dur{font-family:var(--ff-mono);font-size:11px;color:var(--mute);margin-left:auto;white-space:nowrap}

/* Main content — slide layout */
.main-content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.lesson-header{padding:16px 48px 12px;flex-shrink:0;border-bottom:1px solid #e5e7eb;background:#fff;display:flex;align-items:baseline;gap:16px;flex-wrap:wrap}
.lesson-header .mod-label{font-family:var(--ff-mono);font-size:11px;color:var(--red);text-transform:uppercase;letter-spacing:.08em;font-weight:600;flex-shrink:0}
.lesson-header h1{font-size:clamp(18px,2.2vw,24px);font-weight:700;line-height:1.3}

/* Slide viewport */
.slide-viewport{flex:1;overflow-y:auto;padding:32px 48px 40px}
.slide-viewport .lesson-body{max-width:960px}

/* Slide navigation bar */
.slide-bar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:14px 32px;background:#fff;border-top:1px solid #e5e7eb;gap:16px}
.slide-btn{padding:12px 24px;background:var(--navy);color:#fff;border:none;cursor:pointer;font-weight:600;font-size:15px;font-family:var(--ff-display);transition:background .2s;white-space:nowrap}
.slide-btn:hover{background:#1e3a5f}
.slide-btn:disabled{opacity:.25;cursor:default;pointer-events:none}
.slide-btn.green{background:var(--green)}
.slide-btn.green:hover{background:#15803d}
.slide-center{display:flex;flex-direction:column;align-items:center;gap:6px}
.slide-counter{font-family:var(--ff-mono);font-size:12px;color:var(--mute)}
.slide-dots{display:flex;gap:5px;align-items:center}
.slide-dot{width:8px;height:8px;border-radius:50%;background:#ddd;transition:all .2s;cursor:pointer}
.slide-dot:hover{background:#aaa}
.slide-dot.active{background:var(--red);transform:scale(1.4)}
.slide-dot.visited{background:var(--navy)}
.slide-keys{font-family:var(--ff-mono);font-size:10px;color:var(--mute);letter-spacing:.05em;opacity:.5}

/* Lesson body content styles */
.lesson-body{font-size:17px;line-height:1.9;max-width:960px;color:#2d3748}
.lesson-body h2{font-size:24px;font-weight:700;margin:0 0 20px;color:var(--navy)}
.lesson-body h3{font-size:22px;font-weight:700;margin:0 0 20px;color:var(--navy);padding-bottom:10px;border-bottom:3px solid var(--red)}
.lesson-body p{margin-bottom:18px}
.lesson-body p:first-of-type{font-size:18px;color:var(--text);line-height:1.8}
.lesson-body ul,.lesson-body ol{margin:0 0 18px 28px;font-size:16px}
.lesson-body li{margin-bottom:8px;line-height:1.7}
.lesson-body strong{color:var(--navy)}
.lesson-body blockquote{border-left:4px solid var(--red);padding:16px 24px;background:#fef7f7;margin:24px 0;font-style:italic;font-size:16px;color:#555;line-height:1.7}
.lesson-body table{width:100%;border-collapse:collapse;margin:24px 0;font-size:15px}
.lesson-body th{background:var(--navy);color:#fff;padding:12px 16px;text-align:left;font-weight:600;font-size:14px;letter-spacing:.02em}
.lesson-body td{padding:12px 16px;border-bottom:1px solid #e5e7eb}
.lesson-body tr:nth-child(even) td{background:#f8fafc}
.lesson-body .callout{background:#f0f7ff;border-left:4px solid #2563eb;padding:18px 24px;margin:24px 0;font-size:15px;line-height:1.7}
.lesson-body .callout strong{color:#1d4ed8}
.lesson-body .example{background:#f0fdf4;border-left:4px solid var(--green);padding:18px 24px;margin:24px 0;font-size:15px;line-height:1.7}
.lesson-body code{font-family:var(--ff-mono);background:#f1f5f9;padding:3px 8px;font-size:14px}
.lesson-body .template-box{background:var(--navy);color:#fff;padding:20px 24px;margin:24px 0;position:relative}
.lesson-body .template-box>strong{display:block;font-size:15px;margin-bottom:12px;padding-right:80px}
.lesson-body .template-box table{width:100%;background:rgba(255,255,255,.08);border-collapse:collapse;font-size:13px}
.lesson-body .template-box th{background:rgba(255,255,255,.15);color:#fff;padding:8px 12px;text-align:left;font-weight:600;border:1px solid rgba(255,255,255,.12)}
.lesson-body .template-box td{padding:8px 12px;border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.85)}
.lesson-body .template-box ul,.lesson-body .template-box ol{margin:8px 0 8px 20px;font-size:13px;color:rgba(255,255,255,.85)}
.lesson-body .template-box li{margin-bottom:4px}
.lesson-body .template-box a{background:var(--red);color:#fff;padding:8px 16px;text-decoration:none;font-size:13px;font-weight:600}
.template-copy-btn{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.25);padding:6px 12px;font-size:11px;font-family:var(--ff-mono);cursor:pointer;text-transform:uppercase;letter-spacing:.05em;transition:background .2s}
.template-copy-btn:hover{background:rgba(255,255,255,.25)}
.template-copy-btn.copied{background:var(--green);border-color:var(--green)}

/* Interactive components */
.lesson-body .insight-box{display:flex;gap:20px;background:#fefce8;border-left:4px solid #eab308;padding:20px 24px;margin:28px 0;align-items:flex-start}
.lesson-body .insight-box svg{flex-shrink:0;color:#ca8a04;margin-top:2px}
.lesson-body .insight-box .insight-content{font-size:16px;line-height:1.7}
.lesson-body .insight-box .insight-content strong{color:#854d0e}

.lesson-body .narration{background:linear-gradient(135deg,#0b1730 0%,#1e3a5f 100%);color:#fff;padding:28px 32px;margin:28px 0;position:relative;font-size:16px;line-height:1.8}
.lesson-body .narration::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--red)}
.lesson-body .narration .narrator{font-family:var(--ff-mono);font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.5);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.lesson-body .narration p{color:rgba(255,255,255,.9);margin-bottom:10px}
.lesson-body .narration p:last-child{margin-bottom:0}

.lesson-body .diagram{background:var(--navy);border:none;padding:28px;margin:28px 0;text-align:center;display:none}

/* Concept display (replaces SVG diagrams) */
.concept-display{background:linear-gradient(135deg,#0f1d3d 0%,#1a2d52 100%);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:24px 28px;margin:24px 0;text-align:center}
.cd-label{font-family:var(--ff-mono);font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.35);margin-bottom:14px}
.cd-flow{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;align-items:center}
.cd-chip{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);color:#cbd5e1;padding:8px 16px;font-size:13px;border-radius:6px;font-weight:500;transition:all .25s;cursor:default}
.cd-chip:hover{background:rgba(255,255,255,.14);transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.3)}
.cd-chip.main{background:rgba(197,56,60,.2);border-color:rgba(197,56,60,.4);color:#fff;font-weight:700;font-size:14px}
.cd-arrow{color:rgba(255,255,255,.25);font-size:16px}
.cd-caption{font-family:var(--ff-mono);font-size:11px;color:rgba(255,255,255,.4);margin-top:14px;letter-spacing:.02em}
@media(max-width:640px){.cd-flow{gap:6px}.cd-chip{padding:6px 12px;font-size:12px}}

/* Reflection prompt */
.reflect-card{background:linear-gradient(135deg,#fefce8,#fef9c3);border-left:4px solid #eab308;border-radius:0 8px 8px 0;padding:18px 22px;margin:20px 0;display:flex;gap:14px;align-items:flex-start;cursor:pointer;transition:all .2s}
.reflect-card:hover{box-shadow:0 2px 12px rgba(234,179,8,.15)}
.reflect-card .rc-icon{background:#fbbf24;color:#78350f;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;font-family:var(--ff-mono);font-size:16px}
.reflect-card .rc-text{font-size:14px;line-height:1.6;color:#713f12}
.reflect-card .rc-text strong{color:#92400e}
.reflect-card .rc-answer{display:none;margin-top:10px;padding-top:10px;border-top:1px solid rgba(234,179,8,.3);font-style:italic;color:#92400e}
.reflect-card.open .rc-answer{display:block}

/* Narration expandable */
.lesson-body .narration{cursor:pointer;position:relative}
.lesson-body .narration .narr-expand{position:absolute;bottom:8px;right:12px;font-family:var(--ff-mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.35);transition:color .2s}
.lesson-body .narration:hover .narr-expand{color:rgba(255,255,255,.6)}
.lesson-body .narration.collapsed p:not(:first-of-type){display:none}
.lesson-body .narration.collapsed::after{content:'';position:absolute;bottom:0;left:0;right:0;height:40px;background:linear-gradient(transparent,#1e3a5f)}

/* Staggered entrance animation */
@keyframes blockEnter{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.lesson-body.animate>*{opacity:0;animation:blockEnter .4s ease forwards}
.lesson-body.animate>*:nth-child(1){animation-delay:.05s}
.lesson-body.animate>*:nth-child(2){animation-delay:.12s}
.lesson-body.animate>*:nth-child(3){animation-delay:.19s}
.lesson-body.animate>*:nth-child(4){animation-delay:.26s}
.lesson-body.animate>*:nth-child(5){animation-delay:.33s}
.lesson-body.animate>*:nth-child(6){animation-delay:.40s}
.lesson-body.animate>*:nth-child(7){animation-delay:.47s}
.lesson-body.animate>*:nth-child(8){animation-delay:.54s}
.lesson-body.animate>*:nth-child(n+9){animation-delay:.6s}

.lesson-body .checklist{list-style:none;margin:24px 0;padding:0}
.lesson-body .checklist li{display:flex;align-items:flex-start;gap:12px;padding:14px 18px;background:var(--card);border:1px solid #e5e7eb;margin-bottom:8px;font-size:16px;cursor:pointer;transition:all .2s;user-select:none}
.lesson-body .checklist li:hover{background:#f8fafc;border-color:#cbd5e1}
.lesson-body .checklist li.checked{background:#f0fdf4;border-color:#86efac}
.lesson-body .checklist li .ck-box{width:22px;height:22px;border:2px solid #cbd5e1;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:1px}
.lesson-body .checklist li.checked .ck-box{background:var(--green);border-color:var(--green)}
.lesson-body .checklist li.checked .ck-box::after{content:'';width:6px;height:10px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg);margin-top:-2px}

.lesson-body .tabs{margin:28px 0}
.lesson-body .tab-btns{display:flex;gap:0;border-bottom:2px solid #e5e7eb;margin-bottom:0}
.lesson-body .tab-btn{padding:12px 24px;font-size:15px;font-weight:600;color:var(--mute);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;font-family:var(--ff-display);transition:color .2s}
.lesson-body .tab-btn.active{color:var(--navy);border-bottom-color:var(--red)}
.lesson-body .tab-panel{display:none;padding:20px 0;font-size:16px;line-height:1.8}
.lesson-body .tab-panel.active{display:block}

.lesson-body .accordion-lesson{margin:24px 0}
.lesson-body .acc-item{border:1px solid #e5e7eb;margin-bottom:8px}
.lesson-body .acc-trigger{width:100%;padding:16px 20px;background:#fff;border:none;text-align:left;font-family:var(--ff-display);font-size:16px;font-weight:600;color:var(--navy);cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:12px;transition:background .15s}
.lesson-body .acc-trigger:hover{background:#f8fafc}
.lesson-body .acc-trigger .acc-chevron{transition:transform .2s;flex-shrink:0}
.lesson-body .acc-trigger.open .acc-chevron{transform:rotate(180deg)}
.lesson-body .acc-body{display:none;padding:0 20px 16px;font-size:15px;line-height:1.8;color:#444}
.lesson-body .acc-trigger.open+.acc-body{display:block}

.lesson-body .quiz-inline{background:#f8fafc;border:2px solid #e5e7eb;padding:28px;margin:28px 0;position:relative}
.lesson-body .quiz-inline::before{content:'Teste seu conhecimento';position:absolute;top:-12px;left:20px;background:#f8fafc;padding:0 10px;font-family:var(--ff-mono);font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--red);font-weight:700}
.lesson-body .quiz-inline .qi-title{font-family:var(--ff-mono);font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:var(--mute);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.lesson-body .quiz-inline .qi-question{font-size:17px;font-weight:600;margin-bottom:20px;color:var(--navy)}
.lesson-body .quiz-inline .qi-option{display:block;padding:14px 18px;margin-bottom:8px;border:1px solid #e5e7eb;background:#fff;cursor:pointer;font-size:16px;transition:all .15s;font-family:var(--ff-display)}
.lesson-body .quiz-inline .qi-option:hover{border-color:var(--navy);background:#f0f4ff}
.lesson-body .quiz-inline .qi-option.correct{background:#f0fdf4;border-color:var(--green);color:#166534}
.lesson-body .quiz-inline .qi-option.wrong{background:#fef2f2;border-color:#ef4444;color:#991b1b}
.lesson-body .quiz-inline .qi-option.disabled{pointer-events:none;opacity:.7}
.lesson-body .quiz-inline .qi-feedback{display:none;padding:14px 18px;margin-top:14px;font-size:15px;line-height:1.6}
.lesson-body .quiz-inline .qi-feedback.show{display:block}
.lesson-body .quiz-inline .qi-feedback.ok{background:#f0fdf4;border-left:4px solid var(--green);color:#166534}
.lesson-body .quiz-inline .qi-feedback.nok{background:#fef2f2;border-left:4px solid #ef4444;color:#991b1b}

.lesson-body .progress-visual{margin:28px 0}
.lesson-body .pv-bar{background:#e5e7eb;height:10px;overflow:hidden;margin-bottom:8px}
.lesson-body .pv-fill{background:var(--green);height:100%;transition:width .6s ease}
.lesson-body .pv-label{font-family:var(--ff-mono);font-size:13px;color:var(--mute)}

.lesson-body .step-flow{margin:28px 0;counter-reset:stepcount}
.lesson-body .step-item{display:flex;gap:20px;margin-bottom:20px;position:relative}
.lesson-body .step-item::before{counter-increment:stepcount;content:counter(stepcount);width:36px;height:36px;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0;font-family:var(--ff-mono)}
.lesson-body .step-item:not(:last-child)::after{content:'';position:absolute;left:17px;top:40px;bottom:-16px;width:2px;background:#e5e7eb}
.lesson-body .step-content{padding-top:6px;font-size:16px;line-height:1.7}
.lesson-body .step-content strong{color:var(--navy)}

.lesson-body .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin:28px 0}
.lesson-body .kpi-card{background:#fff;border:1px solid #e5e7eb;padding:24px 20px;text-align:center}
.lesson-body .kpi-card .kpi-value{font-size:34px;font-weight:700;color:var(--navy);font-family:var(--ff-mono)}
.lesson-body .kpi-card .kpi-label{font-size:13px;color:var(--mute);margin-top:6px}

.lesson-body .comparison{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:28px 0;border:1px solid #e5e7eb}
.lesson-body .comp-col{padding:24px}
.lesson-body .comp-col:first-child{border-right:1px solid #e5e7eb}
.lesson-body .comp-col.bad{background:#fef2f2}
.lesson-body .comp-col.good{background:#f0fdf4}
.lesson-body .comp-col h4{font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.lesson-body .comp-col.bad h4{color:#dc2626}
.lesson-body .comp-col.good h4{color:var(--green)}
.lesson-body .comp-col ul{margin:0;padding:0 0 0 20px;font-size:15px;line-height:1.7}

/* Template card */
.template-card{background:linear-gradient(135deg,#0b1730,#1e3a5f);color:#fff;padding:24px 28px;margin:28px 0;display:flex;align-items:center;gap:20px}
.template-card svg{flex-shrink:0}
.template-card .tc-text{flex:1}
.template-card .tc-text strong{display:block;font-size:17px;margin-bottom:4px}
.template-card .tc-text span{font-size:13px;color:rgba(255,255,255,.6);font-family:var(--ff-mono)}

/* Interaction hint */
.interact-hint{display:flex;align-items:center;gap:8px;font-family:var(--ff-mono);font-size:11px;color:var(--mute);text-transform:uppercase;letter-spacing:.08em;margin:16px 0 8px;animation:hintPulse 2s infinite}
@keyframes hintPulse{0%,100%{opacity:.5}50%{opacity:1}}

@media(max-width:640px){.lesson-body .comparison{grid-template-columns:1fr}.lesson-body .comp-col:first-child{border-right:none;border-bottom:1px solid #e5e7eb}.lesson-body .kpi-grid{grid-template-columns:1fr 1fr}}

/* Final exam */
.exam-container{max-width:720px;margin:0 auto;padding:40px 24px 60px}
.exam-header{text-align:center;margin-bottom:32px}
.exam-header h1{font-size:28px;font-weight:700;color:var(--navy);margin-bottom:8px}
.exam-header p{color:var(--mute);font-size:15px}
.exam-info{display:flex;gap:24px;justify-content:center;margin-top:16px;font-family:var(--ff-mono);font-size:12px;color:var(--mute)}
.exam-info span{background:#f1f5f9;padding:6px 14px;border-radius:4px}
.exam-progress{text-align:center;font-family:var(--ff-mono);font-size:13px;color:var(--mute);padding:8px;background:#f1f5f9;margin-bottom:24px;position:sticky;top:0;z-index:5}
.exam-question{background:var(--card);padding:28px;margin-bottom:20px;border:1px solid #e5e7eb}
.exam-question .eq-num{font-family:var(--ff-mono);font-size:12px;color:var(--red);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;font-weight:600}
.exam-question .eq-text{font-size:17px;font-weight:600;color:var(--navy);margin-bottom:20px;line-height:1.5}
.exam-question label{display:flex;align-items:flex-start;gap:12px;padding:14px 18px;margin-bottom:8px;border:1px solid #e5e7eb;background:#fff;cursor:pointer;font-size:16px;transition:all .15s}
.exam-question label:hover{border-color:var(--navy);background:#f0f4ff}
.exam-question label.selected{border-color:var(--navy);background:#eef2ff}
.exam-question label.correct{background:#f0fdf4;border-color:var(--green)}
.exam-question label.wrong{background:#fef2f2;border-color:#ef4444}
.exam-question input[type=radio]{margin-top:3px;accent-color:var(--navy)}
.exam-submit{text-align:center;margin-top:32px}
.exam-submit button{padding:16px 40px;background:var(--red);color:#fff;border:none;cursor:pointer;font-weight:700;font-size:16px;font-family:var(--ff-display);transition:background .2s}
.exam-submit button:hover{background:#a52e32}
.exam-submit button:disabled{opacity:.4;cursor:default}
.exam-result{text-align:center;padding:40px;margin:32px 0}
.exam-result.passed{background:#f0fdf4;border:2px solid var(--green)}
.exam-result.failed{background:#fef2f2;border:2px solid #ef4444}
.exam-result h2{font-size:24px;margin-bottom:8px}
.exam-result .score{font-family:var(--ff-mono);font-size:40px;font-weight:700;margin:12px 0}
.exam-result.passed .score{color:var(--green)}
.exam-result.failed .score{color:#ef4444}
.exam-result p{color:var(--mute);font-size:15px;margin-bottom:16px}
.exam-result .btn-cert{display:inline-block;padding:14px 32px;background:var(--green);color:#fff;text-decoration:none;font-weight:700;font-size:15px;margin-top:8px}
.exam-result .btn-retry{padding:14px 32px;background:var(--navy);color:#fff;border:none;cursor:pointer;font-weight:700;font-size:15px;font-family:var(--ff-display);margin-top:8px}
.eq-explanation{display:none;padding:12px 18px;margin-top:8px;font-size:14px;line-height:1.6;background:#fffbeb;border-left:3px solid #eab308;color:#713f12}
.eq-explanation.show{display:block}

.loading{text-align:center;padding:80px 24px;color:var(--mute);font-size:16px}
.toast{position:fixed;bottom:24px;right:24px;background:var(--navy);color:#fff;padding:12px 20px;font-size:14px;opacity:0;transition:opacity .3s;z-index:100}
.toast.show{opacity:1}

@media(max-width:768px){
  .sidebar{position:fixed;left:-320px;top:0;bottom:0;z-index:50;transition:left .3s;box-shadow:4px 0 20px rgba(0,0,0,.15)}
  .sidebar.open{left:0}
  .sidebar-toggle{display:block}
  .lesson-header{padding:16px 20px 0}
  .slide-viewport{padding:16px 20px 24px}
  .player-header .course-title{max-width:120px}
  .slide-dots{display:none}
}
</style>
</head>
<body>
<header class="player-header">
  <div class="left">
    <button class="sidebar-toggle" id="sidebarToggle" aria-label="Menu">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <a href="/ead/meus-cursos" class="brand"><img src="/assets/logo-horizontal-white.png" alt="Anders Tech"></a>
    <span class="course-title" id="courseTitle"></span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="right"><a href="/ead/meus-cursos">Meus cursos</a></div>
</header>

<div class="player-body">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main-content" id="mainContent">
    <div class="loading">Carregando...</div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  var slug=window.location.pathname.split('/').pop();
  var sidebar=document.getElementById('sidebar');
  var main=document.getElementById('mainContent');
  var courseData=null;
  var currentLessonId=null;
  var slides=[];
  var slideIdx=0;
  var keyHandler=null;
  var showSlideFunc=null;

  window.addEventListener('pageshow',function(e){if(e.persisted)window.location.reload()});
  function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},3000)}

  document.getElementById('sidebarToggle').addEventListener('click',function(){sidebar.classList.toggle('open')});

  fetch('/ead/api/player/'+slug).then(function(r){
    if(r.status===403){window.location.href='/ead/checkout/'+slug;return}
    if(r.status===401){window.location.href='/ead/login';return}
    return r.json();
  }).then(function(data){
    if(!data||!data.course)return;
    courseData=data;
    document.getElementById('courseTitle').textContent=data.course.titulo;
    document.title=data.course.titulo+' — Anders Tech EAD';
    renderSidebar();
    var firstLesson=null;
    var allDone=true;
    for(var m=0;m<data.modules.length;m++){
      var aulas=data.modules[m].aulas||[];
      for(var a=0;a<aulas.length;a++){
        if(!firstLesson)firstLesson=aulas[a].id;
        if(!aulas[a].completed){allDone=false;loadLesson(aulas[a].id);return}
      }
    }
    if(allDone&&new URLSearchParams(window.location.search).get('exam')==='1'){
      loadFinalExam();
    }else if(firstLesson){loadLesson(firstLesson);}
  }).catch(function(){main.innerHTML='<div class="loading">Erro ao carregar curso.</div>'});

  function renderSidebar(){
    var html='';
    var totalLessons=0,completedLessons=0;
    courseData.modules.forEach(function(m,i){
      var isOpen=false;
      var lessons='';
      (m.aulas||[]).forEach(function(l){
        totalLessons++;
        if(l.completed)completedLessons++;
        if(l.id===currentLessonId)isOpen=true;
        lessons+='<div class="lesson-link'+(l.id===currentLessonId?' active':'')+'" data-id="'+l.id+'">'
          +'<span class="check'+(l.completed?' done':'')+'"></span>'
          +'<span>'+l.titulo+'</span>'
          +'<span class="dur">'+(l.duracao||'')+'</span></div>';
      });
      html+='<div class="mod-header'+(isOpen||i===0?' open':'')+'" onclick="this.classList.toggle(\'open\')">Módulo '+(i+1)+': '+m.titulo+'<span>'+(m.aulas?m.aulas.length:0)+' aulas</span></div>'
        +'<div class="mod-lessons"'+(isOpen||i===0?' style="display:block"':'')+'>'+lessons+'</div>';
    });
    sidebar.innerHTML=html;
    if(totalLessons)document.getElementById('progressFill').style.width=Math.round(completedLessons/totalLessons*100)+'%';
    sidebar.querySelectorAll('.lesson-link').forEach(function(el){
      el.addEventListener('click',function(){loadLesson(parseInt(el.dataset.id));sidebar.classList.remove('open')});
    });
  }

  function allLessonsComplete(){
    if(!courseData||!courseData.modules)return false;
    for(var m=0;m<courseData.modules.length;m++){
      var aulas=courseData.modules[m].aulas||[];
      for(var a=0;a<aulas.length;a++){
        if(!aulas[a].completed)return false;
      }
    }
    return courseData.modules.length>0;
  }

  function loadFinalExam(){
    if(keyHandler){document.removeEventListener('keydown',keyHandler);keyHandler=null}
    currentLessonId=null;
    renderSidebar();
    main.style.overflow='auto';
    main.innerHTML='<div class="loading" style="padding-top:120px">Carregando prova final...</div>';
    fetch('/ead/api/quiz/'+slug+'?final=1').then(function(r){
      if(!r.ok)throw new Error();
      return r.json();
    }).then(function(data){
      var questions=data.questions;
      if(!questions||!questions.length){
        main.innerHTML='<div class="exam-container"><div class="exam-header"><h1>Prova Final</h1><p>Nenhuma pergunta disponível para este curso ainda.</p></div></div>';
        return;
      }
      var html='<div class="exam-container">'
        +'<div class="exam-header"><h1>Prova Final</h1>'
        +'<p>'+courseData.course.titulo+'</p>'
        +'<div class="exam-info"><span>'+questions.length+' questões</span><span>Aprovação: 70%</span></div></div>'
        +'<div class="exam-progress" id="examProgress">0 / '+questions.length+' respondidas</div>';
      questions.forEach(function(q,i){
        var alts=Array.isArray(q.alternativas)?q.alternativas:JSON.parse(q.alternativas);
        html+='<div class="exam-question" data-qid="'+q.id+'">'
          +'<div class="eq-num">Questão '+(i+1)+'</div>'
          +'<div class="eq-text">'+q.pergunta+'</div>';
        alts.forEach(function(alt,j){
          html+='<label data-idx="'+j+'"><input type="radio" name="q'+q.id+'" value="'+j+'"><span>'+alt+'</span></label>';
        });
        html+='<div class="eq-explanation"></div></div>';
      });
      html+='<div class="exam-submit"><button id="examSubmit">Enviar respostas</button></div>'
        +'<div id="examResult" style="display:none"></div></div>';
      main.innerHTML=html;
      main.scrollTop=0;
      function updateProgress(){
        var count=main.querySelectorAll('.exam-question input:checked').length;
        var el=document.getElementById('examProgress');
        if(el)el.textContent=count+' / '+questions.length+' respondidas';
      }
      main.querySelectorAll('.exam-question label').forEach(function(lbl){
        lbl.addEventListener('click',function(){
          var q=lbl.closest('.exam-question');
          q.querySelectorAll('label').forEach(function(l){l.classList.remove('selected')});
          lbl.classList.add('selected');
          setTimeout(updateProgress,10);
        });
      });
      document.getElementById('examSubmit').addEventListener('click',function(){
        var answers={};
        var answered=0;
        main.querySelectorAll('.exam-question').forEach(function(q){
          var checked=q.querySelector('input:checked');
          if(checked){answers[q.dataset.qid]=parseInt(checked.value);answered++}
        });
        if(answered<questions.length){
          showToast('Responda todas as '+questions.length+' questões.');
          var firstUnanswered=null;
          main.querySelectorAll('.exam-question').forEach(function(q){
            if(!firstUnanswered&&!q.querySelector('input:checked'))firstUnanswered=q;
          });
          if(firstUnanswered)firstUnanswered.scrollIntoView({behavior:'smooth',block:'center'});
          return;
        }
        var btn=document.getElementById('examSubmit');
        btn.disabled=true;btn.textContent='Enviando...';
        fetch('/ead/api/quiz/'+slug+'/submit',{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({answers:answers,isFinal:true})
        }).then(function(r){return r.json()}).then(function(res){
          res.results.forEach(function(r){
            var q=main.querySelector('[data-qid="'+r.questionId+'"]');
            if(!q)return;
            q.querySelectorAll('label').forEach(function(lbl){
              lbl.querySelector('input').disabled=true;
              lbl.style.cursor='default';
              var idx=parseInt(lbl.dataset.idx);
              if(idx===r.correctAnswer)lbl.classList.add('correct');
              else if(lbl.classList.contains('selected')&&!r.correct)lbl.classList.add('wrong');
            });
            if(r.explicacao){
              var exp=q.querySelector('.eq-explanation');
              exp.textContent=r.explicacao;exp.classList.add('show');
            }
          });
          var rd=document.getElementById('examResult');
          rd.style.display='block';
          if(res.passed){
            rd.className='exam-result passed';
            rd.innerHTML='<h2>Aprovado!</h2>'
              +'<div class="score">'+Math.round(res.score)+'%</div>'
              +'<p>'+res.correct+' de '+res.total+' questões corretas</p>'
              +(res.certificateCode?'<a href="/ead/api/certificate/'+res.certificateCode+'" target="_blank" class="btn-cert">Baixar certificado (PDF)</a><br><a href="/ead/certificado/'+res.certificateCode+'" style="display:inline-block;margin-top:12px;color:var(--mute);font-size:13px">Verificar certificado</a>':'');
          }else{
            rd.className='exam-result failed';
            rd.innerHTML='<h2>Nota insuficiente</h2>'
              +'<div class="score">'+Math.round(res.score)+'%</div>'
              +'<p>Necessário 70% para aprovação ('+res.correct+'/'+res.total+' corretas). Revise o conteúdo e tente novamente.</p>'
              +'<button class="btn-retry" id="examRetry">Tentar novamente</button>';
            document.getElementById('examRetry').addEventListener('click',loadFinalExam);
          }
          rd.scrollIntoView({behavior:'smooth'});
          btn.style.display='none';
          var prog=document.getElementById('examProgress');
          if(prog)prog.style.display='none';
        }).catch(function(){
          btn.disabled=false;btn.textContent='Enviar respostas';
          showToast('Erro ao enviar. Tente novamente.');
        });
      });
    }).catch(function(){
      main.innerHTML='<div class="exam-container" style="text-align:center;padding:80px 24px"><p style="color:var(--mute);margin-bottom:20px">Erro ao carregar a prova.</p><button id="examRetryLoad" style="padding:10px 24px;background:var(--red);color:#fff;border:none;cursor:pointer;font-size:14px;font-weight:600">Tentar novamente</button></div>';
      document.getElementById('examRetryLoad').addEventListener('click',loadFinalExam);
    });
  }

  function splitSlides(html){
    if(!html)return['<p>Conteúdo em produção.</p>'];
    html=html.replace(/^\s*<h2[^>]*>[\s\S]*?<\/h2>\s*/i,'');
    var parts=html.split(/(?=<h3[\s>])/i);
    parts=parts.filter(function(p){return p.trim().length>20});
    if(!parts.length)parts=[html];
    var final=[];
    var VISUAL_RE=/(?=<div class="(?:diagram|narration|quiz-inline|template-box|comparison|kpi-grid|step-flow|checklist|tabs|accordion-lesson|insight-box))/i;
    var BLOCK_RE=/(?=<(?:p>|p |ul[\s>]|ol[\s>]|blockquote|table[\s>]|div class="))/i;
    parts.forEach(function(s){
      var visBlocks=s.split(VISUAL_RE);
      visBlocks.forEach(function(vb){
        if(vb.length<1000){if(vb.trim().length>20)final.push(vb);return}
        var subs=vb.split(BLOCK_RE);
        var chunk='';
        subs.forEach(function(sub){
          if(chunk.length+sub.length>1000&&chunk.length>60){
            final.push(chunk);chunk=sub;
          }else{chunk+=sub;}
        });
        if(chunk.trim().length>20)final.push(chunk);
      });
    });
    return final.length?final:[html];
  }

  function hasInteractive(html){
    return /class="(quiz-inline|checklist|tabs|accordion-lesson|template-box)"/i.test(html);
  }

  function loadLesson(id){
    currentLessonId=id;
    main.style.overflow='';
    main.innerHTML='<div class="loading" style="padding-top:120px">Carregando aula...</div>';
    if(keyHandler){document.removeEventListener('keydown',keyHandler);keyHandler=null}

    fetch('/ead/api/lesson/'+id).then(function(r){
      if(r.status===401){window.location.href='/ead/login?redirect='+encodeURIComponent(window.location.pathname);return}
      if(r.status===403){window.location.href='/ead/checkout/'+slug;return}
      return r.json();
    }).then(function(l){
      if(!l)return;
      if(!l.id){
        main.innerHTML='<div class="loading">'+(l.error||'Aula não encontrada.')+'<br><br><button id="retryBtn" style="padding:10px 24px;background:var(--red);color:#fff;border:none;cursor:pointer;font-size:14px;font-weight:600">Tentar novamente</button></div>';
        document.getElementById('retryBtn').addEventListener('click',function(){loadLesson(id)});
        return;
      }

      slides=splitSlides(l.conteudo);

      if(l.entregavel_titulo){
        slides.push('<div class="template-card"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>'
          +'<div class="tc-text"><strong>'+l.entregavel_titulo+'</strong><span>Incluso nesta aula</span></div></div>');
      }

      slideIdx=0;
      var visited=[];

      main.innerHTML='<div class="lesson-header">'
        +'<div class="mod-label">'+l.module_titulo+'</div>'
        +'<h1>'+l.titulo+'</h1></div>'
        +'<div class="slide-viewport" id="slideViewport"><div class="lesson-body" id="slideContent"></div></div>'
        +'<div class="slide-bar">'
        +'<button class="slide-btn" id="slidePrev" disabled>&larr; Anterior</button>'
        +'<div class="slide-center">'
        +'<div class="slide-dots" id="slideDots"></div>'
        +'<div class="slide-counter" id="slideCounter"></div>'
        +'</div>'
        +'<button class="slide-btn" id="slideNext">Próximo &rarr;</button>'
        +'</div>';

      var dotsHtml='';
      for(var d=0;d<slides.length;d++)dotsHtml+='<span class="slide-dot'+(d===0?' active':'')+'" data-idx="'+d+'"></span>';
      document.getElementById('slideDots').innerHTML=dotsHtml;

      function showSlide(idx){
        if(idx<0||idx>=slides.length)return;
        slideIdx=idx;showSlideFunc=showSlide;
        if(visited.indexOf(idx)===-1)visited.push(idx);
        var sc=document.getElementById('slideContent');
        var content=slides[idx];
        if(hasInteractive(content)){
          content='<div class="interact-hint"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5"/></svg> Interaja com os elementos abaixo</div>'+content;
        }
        sc.innerHTML=content;
        document.getElementById('slideViewport').scrollTop=0;

        var isLast=idx===slides.length-1;
        document.getElementById('slidePrev').disabled=idx===0;
        var nextBtn=document.getElementById('slideNext');

        if(isLast){
          if(!l.completed){
            nextBtn.textContent='Concluir aula';
            nextBtn.className='slide-btn green';
            nextBtn.disabled=false;
            nextBtn.onclick=function(){
              fetch('/ead/api/lesson/'+id+'/complete',{method:'POST'}).then(function(r){return r.json()}).then(function(){
                l.completed=true;
                showToast('Aula concluída!');
                courseData.modules.forEach(function(m){
                  (m.aulas||[]).forEach(function(a){if(a.id===id)a.completed=true});
                });
                renderSidebar();
                if(l.next){
                  nextBtn.textContent=l.next.titulo+' →';
                  nextBtn.className='slide-btn';
                  nextBtn.onclick=function(){loadLesson(l.next.id)};
                }else if(allLessonsComplete()){
                  nextBtn.textContent='Fazer prova final →';
                  nextBtn.className='slide-btn green';
                  nextBtn.disabled=false;
                  nextBtn.onclick=function(){loadFinalExam()};
                }else{
                  nextBtn.textContent='Aula concluída';
                  nextBtn.className='slide-btn green';
                  nextBtn.disabled=true;
                }
              });
            };
          }else if(l.next){
            nextBtn.textContent=l.next.titulo+' →';
            nextBtn.className='slide-btn';
            nextBtn.disabled=false;
            nextBtn.onclick=function(){loadLesson(l.next.id)};
          }else if(allLessonsComplete()){
            nextBtn.textContent='Fazer prova final →';
            nextBtn.className='slide-btn green';
            nextBtn.disabled=false;
            nextBtn.onclick=function(){loadFinalExam()};
          }else{
            nextBtn.textContent='Aula concluída';
            nextBtn.className='slide-btn green';
            nextBtn.disabled=true;
          }
        }else{
          nextBtn.textContent='Próximo →';
          nextBtn.className='slide-btn';
          nextBtn.disabled=false;
          nextBtn.onclick=function(){showSlide(slideIdx+1)};
        }

        document.getElementById('slidePrev').onclick=function(){
          if(slideIdx>0)showSlide(slideIdx-1);
          else if(l.prev)loadLesson(l.prev.id);
        };

        document.getElementById('slideCounter').textContent=(idx+1)+' / '+slides.length;
        document.querySelectorAll('.slide-dot').forEach(function(dot,di){
          dot.className='slide-dot'+(di===idx?' active':(visited.indexOf(di)!==-1?' visited':''));
        });

        initInteractive();
        upgradeDiagrams();
        addSlideInteractions(content,idx);
      }

      document.querySelectorAll('.slide-dot').forEach(function(dot){
        dot.addEventListener('click',function(){showSlide(parseInt(dot.dataset.idx))});
      });

      keyHandler=function(e){
        if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
        if(e.key==='ArrowRight'||e.key===' '){
          e.preventDefault();
          if(slideIdx<slides.length-1)showSlide(slideIdx+1);
        }
        if(e.key==='ArrowLeft'){
          e.preventDefault();
          if(slideIdx>0)showSlide(slideIdx-1);
        }
      };
      document.addEventListener('keydown',keyHandler);

      showSlide(0);
      renderSidebar();

    }).catch(function(){
      main.innerHTML='<div class="loading">Erro de conexão.<br><br><button id="retryBtn2" style="padding:10px 24px;background:var(--red);color:#fff;border:none;cursor:pointer;font-size:14px;font-weight:600">Tentar novamente</button></div>';
      document.getElementById('retryBtn2').addEventListener('click',function(){loadLesson(id)});
    });
  }

  function initInteractive(){
    main.querySelectorAll('.tabs').forEach(function(t){
      var btns=t.querySelectorAll('.tab-btn');
      var panels=t.querySelectorAll('.tab-panel');
      btns.forEach(function(b,i){
        b.addEventListener('click',function(){
          btns.forEach(function(x){x.classList.remove('active')});
          panels.forEach(function(x){x.classList.remove('active')});
          b.classList.add('active');
          if(panels[i])panels[i].classList.add('active');
        });
      });
    });
    main.querySelectorAll('.acc-trigger').forEach(function(t){
      t.addEventListener('click',function(){t.classList.toggle('open')});
    });
    main.querySelectorAll('.checklist li').forEach(function(li){
      li.addEventListener('click',function(){li.classList.toggle('checked')});
    });
    main.querySelectorAll('.quiz-inline').forEach(function(q){
      var correct=q.dataset.correct;
      var fb=q.querySelector('.qi-feedback');
      q.querySelectorAll('.qi-option').forEach(function(opt){
        opt.addEventListener('click',function(){
          if(q.classList.contains('answered'))return;
          q.classList.add('answered');
          q.querySelectorAll('.qi-option').forEach(function(o){o.classList.add('disabled')});
          if(opt.dataset.key===correct){
            opt.classList.add('correct');
            if(fb){fb.className='qi-feedback show ok';fb.textContent=q.dataset.fbOk||'Correto!'}
          }else{
            opt.classList.add('wrong');
            q.querySelector('[data-key="'+correct+'"]').classList.add('correct');
            if(fb){fb.className='qi-feedback show nok';fb.textContent=q.dataset.fbNok||'Resposta incorreta. Veja a opção destacada.'}
          }
        });
      });
    });
    // Narration: make expandable if multiple paragraphs
    main.querySelectorAll('.narration').forEach(function(n){
      var ps=n.querySelectorAll('p');
      if(ps.length>2){
        n.classList.add('collapsed');
        var exp=document.createElement('span');
        exp.className='narr-expand';
        exp.textContent='Clique para expandir';
        n.appendChild(exp);
        n.addEventListener('click',function(){
          n.classList.toggle('collapsed');
          exp.textContent=n.classList.contains('collapsed')?'Clique para expandir':'Clique para recolher';
        });
      }
    });

    main.querySelectorAll('.template-box').forEach(function(tb){
      if(tb.querySelector('.template-copy-btn'))return;
      var btn=document.createElement('button');
      btn.className='template-copy-btn';
      btn.textContent='Copiar';
      btn.addEventListener('click',function(){
        var table=tb.querySelector('table');
        var list=tb.querySelector('ul,ol');
        var text='';
        if(table){
          var rows=table.querySelectorAll('tr');
          rows.forEach(function(r){
            var cells=[];
            r.querySelectorAll('th,td').forEach(function(c){cells.push(c.textContent.trim())});
            text+=cells.join('\t')+'\n';
          });
        }else if(list){
          list.querySelectorAll('li').forEach(function(li){text+=li.textContent.trim()+'\n'});
        }else{
          text=tb.textContent.replace('Copiar','').trim();
        }
        navigator.clipboard.writeText(text).then(function(){
          btn.textContent='Copiado!';btn.classList.add('copied');
          setTimeout(function(){btn.textContent='Copiar';btn.classList.remove('copied')},2000);
        });
      });
      tb.appendChild(btn);
    });
  }

  function upgradeDiagrams(){
    main.querySelectorAll('.diagram').forEach(function(d){
      var svg=d.querySelector('svg');
      var cap=d.querySelector('figcaption');
      if(!svg)return;
      var items=[];
      svg.querySelectorAll('text').forEach(function(t){
        var txt=t.textContent.trim();
        if(!txt||txt.length<2)return;
        items.push({t:txt,x:parseFloat(t.getAttribute('x')||0),y:parseFloat(t.getAttribute('y')||0),b:t.getAttribute('font-weight')==='bold',s:parseInt(t.getAttribute('font-size')||'10')});
      });
      if(!items.length)return;
      var merged=[];
      items.forEach(function(it){
        var found=false;
        for(var m=0;m<merged.length;m++){
          if(Math.abs(it.x-merged[m].x)<15&&Math.abs(it.y-merged[m].y)<18){
            merged[m].t+=' '+it.t;
            if(it.b)merged[m].b=true;
            if(it.s>merged[m].s)merged[m].s=it.s;
            merged[m].y=Math.max(merged[m].y,it.y);
            found=true;break;
          }
        }
        if(!found)merged.push({t:it.t,x:it.x,y:it.y,b:it.b,s:it.s});
      });
      var concepts=[];var seen={};
      merged.forEach(function(m){
        var k=m.t.toLowerCase().trim();
        if(!seen[k]&&m.t.length>2){seen[k]=true;concepts.push({text:m.t,main:m.b&&m.s>=10});}
      });
      if(!concepts.length)return;
      var h='<div class="concept-display"><div class="cd-label">Mapa conceitual</div><div class="cd-flow">';
      concepts.forEach(function(c,i){
        if(i>0&&concepts.length<=12)h+='<span class="cd-arrow">→</span>';
        h+='<span class="cd-chip'+(c.main?' main':'')+'">'+c.text+'</span>';
      });
      h+='</div>';
      if(cap)h+='<div class="cd-caption">'+cap.textContent+'</div>';
      h+='</div>';
      d.outerHTML=h;
    });
  }

  function addSlideInteractions(content,idx){
    var sc=document.getElementById('slideContent');
    if(!sc)return;
    // Staggered entrance animation
    sc.classList.add('animate');
    setTimeout(function(){sc.classList.remove('animate')},1200);

    // Reflection prompt on content-only slides (no quiz, every 3rd)
    if(idx>0&&idx%3===0&&!hasInteractive(content)){
      var strongMatch=content.match(/<strong>([^<]{8,60})<\/strong>/);
      if(strongMatch){
        var topic=strongMatch[1].replace(/^\w/,function(c){return c.toLowerCase()});
        var prompts=['Como '+topic+' se aplica na sua realidade?','Você consegue dar um exemplo prático de '+topic+'?','Na sua empresa, como '+topic+' é tratado hoje?','Que dificuldades você já enfrentou com '+topic+'?'];
        var prompt=prompts[idx%prompts.length];
        var card=document.createElement('div');
        card.className='reflect-card';
        card.innerHTML='<div class="rc-icon">?</div><div class="rc-text"><strong>Reflita:</strong> '+prompt+'<div class="rc-answer">Anote suas ideias! Usar exemplos reais ajuda a fixar o conceito.</div></div>';
        card.addEventListener('click',function(){card.classList.toggle('open')});
        sc.appendChild(card);
      }
    }

    // Make insight boxes clickable (toggle highlight)
    sc.querySelectorAll('.insight-box').forEach(function(ib){
      ib.style.cursor='pointer';
      ib.addEventListener('click',function(){
        if(ib.style.borderLeftColor==='rgb(22, 163, 74)'){
          ib.style.borderLeftColor='';ib.style.background='';
        }else{
          ib.style.borderLeftColor='#16a34a';ib.style.background='#f0fdf4';
        }
      });
    });
  }

  // Touch swipe navigation
  var swipeStartX=0,swipeStartY=0;
  document.addEventListener('touchstart',function(e){
    swipeStartX=e.changedTouches[0].screenX;
    swipeStartY=e.changedTouches[0].screenY;
  },{passive:true});
  document.addEventListener('touchend',function(e){
    var dx=e.changedTouches[0].screenX-swipeStartX;
    var dy=e.changedTouches[0].screenY-swipeStartY;
    if(Math.abs(dx)<60||Math.abs(dy)>Math.abs(dx))return;
    if(dx>0&&slideIdx>0&&showSlideFunc){showSlideFunc(slideIdx-1)}
    else if(dx<0&&slideIdx<slides.length-1&&showSlideFunc){showSlideFunc(slideIdx+1)}
  },{passive:true});
})();
</script>
