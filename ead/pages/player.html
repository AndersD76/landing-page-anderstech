<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Player — Anders Tech EAD</title>
<link rel="icon" href="/assets/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--navy:#0b1730;--red:#c5383c;--bg:#f4f5f7;--card:#fff;--text:#1a1a2e;--mute:#6b7280;--green:#16a34a;--sidebar-w:320px;--ff-display:'Space Grotesk',sans-serif;--ff-mono:'JetBrains Mono',monospace}
body{font-family:var(--ff-display);background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column}

.player-header{background:var(--navy);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;z-index:10;flex-shrink:0}
.player-header .left{display:flex;align-items:center;gap:12px}
.player-header a.brand{color:#fff;text-decoration:none;font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px}
.player-header img{height:44px}
.player-header .course-title{color:rgba(255,255,255,.7);font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:300px}
.player-header .right a{color:rgba(255,255,255,.6);text-decoration:none;font-size:13px;padding:6px 12px}
.player-header .progress-bar{background:rgba(255,255,255,.15);height:3px;flex:1;max-width:200px;margin:0 12px}
.player-header .progress-fill{background:var(--green);height:100%;transition:width .3s}
.sidebar-toggle{display:none;background:none;border:none;color:#fff;cursor:pointer;padding:8px}

.player-body{display:flex;flex:1;overflow:hidden}

.sidebar{width:var(--sidebar-w);background:var(--card);border-right:1px solid #e5e7eb;overflow-y:auto;flex-shrink:0}
.sidebar .mod-header{padding:14px 16px;font-size:13px;font-weight:700;color:var(--navy);background:#f9fafb;border-bottom:1px solid #e5e7eb;cursor:pointer;display:flex;justify-content:space-between;align-items:center;user-select:none}
.sidebar .mod-header.open{background:#eef2ff}
.sidebar .mod-lessons{display:none}
.sidebar .mod-header.open+.mod-lessons{display:block}
.sidebar .lesson-link{display:flex;align-items:center;gap:10px;padding:10px 16px 10px 24px;font-size:13px;color:var(--text);text-decoration:none;border-bottom:1px solid #f5f5f5;transition:background .15s;cursor:pointer}
.sidebar .lesson-link:hover{background:#f0f4ff}
.sidebar .lesson-link.active{background:#eef2ff;color:var(--red);font-weight:600}
.sidebar .lesson-link .check{width:16px;height:16px;border:2px solid #ccc;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.sidebar .lesson-link .check.done{background:var(--green);border-color:var(--green)}
.sidebar .lesson-link .check.done::after{content:'';width:6px;height:6px;background:#fff;border-radius:50%}
.sidebar .lesson-link .dur{font-family:var(--ff-mono);font-size:11px;color:var(--mute);margin-left:auto;white-space:nowrap}

/* Main content — slide layout */
.main-content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.lesson-header{padding:16px 48px 12px;flex-shrink:0;border-bottom:1px solid #e5e7eb;background:#fff;display:flex;align-items:baseline;gap:16px;flex-wrap:wrap}
.lesson-header .mod-label{font-family:var(--ff-mono);font-size:11px;color:var(--red);text-transform:uppercase;letter-spacing:.08em;font-weight:600;flex-shrink:0}
.lesson-header h1{font-size:clamp(18px,2.2vw,24px);font-weight:700;line-height:1.3}

/* Slide viewport */
.slide-viewport{flex:1;overflow-y:auto;padding:32px 48px 40px}
.slide-viewport .lesson-body{max-width:960px}

/* Slide navigation bar */
.slide-bar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:14px 32px;background:#fff;border-top:1px solid #e5e7eb;gap:16px}
.slide-btn{padding:12px 24px;background:var(--navy);color:#fff;border:none;cursor:pointer;font-weight:600;font-size:15px;font-family:var(--ff-display);transition:background .2s;white-space:nowrap}
.slide-btn:hover{background:#1e3a5f}
.slide-btn:disabled{opacity:.25;cursor:default;pointer-events:none}
.slide-btn.green{background:var(--green)}
.slide-btn.green:hover{background:#15803d}
.slide-center{display:flex;flex-direction:column;align-items:center;gap:6px}
.slide-counter{font-family:var(--ff-mono);font-size:12px;color:var(--mute)}
.slide-dots{display:flex;gap:5px;align-items:center}
.slide-dot{width:8px;height:8px;border-radius:50%;background:#ddd;transition:all .2s;cursor:pointer}
.slide-dot:hover{background:#aaa}
.slide-dot.active{background:var(--red);transform:scale(1.4)}
.slide-dot.visited{background:var(--navy)}
.slide-keys{font-family:var(--ff-mono);font-size:10px;color:var(--mute);letter-spacing:.05em;opacity:.5}

/* Lesson body content styles */
.lesson-body{font-size:17px;line-height:1.9;max-width:960px;color:#2d3748}
.lesson-body h2{font-size:24px;font-weight:700;margin:0 0 20px;color:var(--navy)}
.lesson-body h3{font-size:22px;font-weight:700;margin:0 0 20px;color:var(--navy);padding-bottom:10px;border-bottom:3px solid var(--red)}
.lesson-body p{margin-bottom:18px}
.lesson-body p:first-of-type{font-size:18px;color:var(--text);line-height:1.8}
.lesson-body ul,.lesson-body ol{margin:0 0 18px 28px;font-size:16px}
.lesson-body li{margin-bottom:8px;line-height:1.7}
.lesson-body strong{color:var(--navy)}
.lesson-body blockquote{border-left:4px solid var(--red);padding:16px 24px;background:#fef7f7;margin:24px 0;font-style:italic;font-size:16px;color:#555;line-height:1.7}
.lesson-body table{width:100%;border-collapse:collapse;margin:24px 0;font-size:15px}
.lesson-body th{background:var(--navy);color:#fff;padding:12px 16px;text-align:left;font-weight:600;font-size:14px;letter-spacing:.02em}
.lesson-body td{padding:12px 16px;border-bottom:1px solid #e5e7eb}
.lesson-body tr:nth-child(even) td{background:#f8fafc}
.lesson-body .callout{background:#f0f7ff;border-left:4px solid #2563eb;padding:18px 24px;margin:24px 0;font-size:15px;line-height:1.7}
.lesson-body .callout strong{color:#1d4ed8}
.lesson-body .example{background:#f0fdf4;border-left:4px solid var(--green);padding:18px 24px;margin:24px 0;font-size:15px;line-height:1.7}
.lesson-body code{font-family:var(--ff-mono);background:#f1f5f9;padding:3px 8px;font-size:14px}
.lesson-body .template-box{background:var(--navy);color:#fff;padding:20px 24px;margin:24px 0;position:relative}
.lesson-body .template-box>strong{display:block;font-size:15px;margin-bottom:12px;padding-right:80px}
.lesson-body .template-box table{width:100%;background:rgba(255,255,255,.08);border-collapse:collapse;font-size:13px}
.lesson-body .template-box th{background:rgba(255,255,255,.15);color:#fff;padding:8px 12px;text-align:left;font-weight:600;border:1px solid rgba(255,255,255,.12)}
.lesson-body .template-box td{padding:8px 12px;border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.85)}
.lesson-body .template-box ul,.lesson-body .template-box ol{margin:8px 0 8px 20px;font-size:13px;color:rgba(255,255,255,.85)}
.lesson-body .template-box li{margin-bottom:4px}
.lesson-body .template-box a{background:var(--red);color:#fff;padding:8px 16px;text-decoration:none;font-size:13px;font-weight:600}
.template-copy-btn{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.25);padding:6px 12px;font-size:11px;font-family:var(--ff-mono);cursor:pointer;text-transform:uppercase;letter-spacing:.05em;transition:background .2s}
.template-copy-btn:hover{background:rgba(255,255,255,.25)}
.template-copy-btn.copied{background:var(--green);border-color:var(--green)}

/* Interactive components */
.lesson-body .insight-box{display:flex;gap:20px;background:#fefce8;border-left:4px solid #eab308;padding:20px 24px;margin:28px 0;align-items:flex-start}
.lesson-body .insight-box svg{flex-shrink:0;color:#ca8a04;margin-top:2px}
.lesson-body .insight-box .insight-content{font-size:16px;line-height:1.7}
.lesson-body .insight-box .insight-content strong{color:#854d0e}

.lesson-body .narration{background:linear-gradient(135deg,#0b1730 0%,#1e3a5f 100%);color:#fff;padding:28px 32px;margin:28px 0;position:relative;font-size:16px;line-height:1.8}
.lesson-body .narration::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--red)}
.lesson-body .narration .narrator{font-family:var(--ff-mono);font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.5);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.lesson-body .narration p{color:rgba(255,255,255,.9);margin-bottom:10px}
.lesson-body .narration p:last-child{margin-bottom:0}

.lesson-body .diagram{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:32px;margin:28px 0;text-align:center;position:relative;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.lesson-body .diagram svg{max-width:100%;height:auto;display:block;margin:0 auto}
.lesson-body .diagram svg rect{cursor:default;transition:filter .3s,transform .3s;transform-origin:center}
.lesson-body .diagram svg rect:hover{filter:brightness(1.08) drop-shadow(0 2px 8px rgba(0,0,0,.15));transform:scale(1.03)}
.lesson-body .diagram svg circle{transition:filter .3s,transform .3s;transform-origin:center}
.lesson-body .diagram svg circle:hover{filter:brightness(1.08) drop-shadow(0 2px 8px rgba(0,0,0,.12));transform:scale(1.03)}
.lesson-body .diagram figcaption{font-family:var(--ff-mono);font-size:12px;color:var(--mute);margin-top:14px;letter-spacing:.02em}
.lesson-body .diagram .diagram-title{display:flex;align-items:center;gap:10px;text-align:left;font-family:var(--ff-display);font-size:15px;font-weight:700;color:var(--navy);margin:-8px -8px 18px;padding:0 8px 12px;border-bottom:1px solid #f1f5f9}
.lesson-body .diagram .diagram-title::before{content:'';width:8px;height:8px;background:var(--red);flex-shrink:0}
.lesson-body .diagram .diagram-zoom{position:absolute;top:12px;right:12px;width:32px;height:32px;border:1px solid #e5e7eb;background:#fff;border-radius:8px;cursor:zoom-in;display:flex;align-items:center;justify-content:center;color:var(--mute);opacity:0;transition:opacity .2s,color .2s,border-color .2s}
.lesson-body .diagram:hover .diagram-zoom{opacity:1}
.lesson-body .diagram .diagram-zoom:hover{color:var(--navy);border-color:var(--navy)}
.lesson-body .diagram svg{cursor:zoom-in}
.diagram-modal{position:fixed;inset:0;background:rgba(11,23,48,.93);z-index:9998;display:none;flex-direction:column;align-items:center;justify-content:center;padding:4vh 4vw;cursor:zoom-out}
.diagram-modal.open{display:flex}
.diagram-modal .dm-stage{background:#fff;border-radius:12px;padding:32px;max-width:min(1100px,92vw);max-height:84vh;display:flex;align-items:center;justify-content:center;cursor:default;overflow:auto}
.diagram-modal .dm-stage svg{width:min(1000px,88vw);height:auto;max-height:76vh}
.diagram-modal .dm-caption{color:rgba(255,255,255,.75);font-family:var(--ff-mono);font-size:13px;margin-top:16px;text-align:center;max-width:80ch}
.diagram-modal .dm-close{position:absolute;top:20px;right:24px;width:44px;height:44px;border:1px solid rgba(255,255,255,.25);background:transparent;border-radius:10px;color:#fff;font-size:22px;line-height:1;cursor:pointer;transition:background .2s}
.diagram-modal .dm-close:hover{background:rgba(255,255,255,.12)}

/* Slide content transition */
.lesson-body{transition:opacity .3s ease,transform .3s ease}

/* Reflection prompt */
.reflect-card{background:linear-gradient(135deg,#fefce8,#fef9c3);border-left:4px solid #eab308;border-radius:0 8px 8px 0;padding:18px 22px;margin:20px 0;display:flex;gap:14px;align-items:flex-start;cursor:pointer;transition:all .2s}
.reflect-card:hover{box-shadow:0 2px 12px rgba(234,179,8,.15)}
.reflect-card .rc-icon{background:#fbbf24;color:#78350f;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;font-family:var(--ff-mono);font-size:16px}
.reflect-card .rc-text{font-size:14px;line-height:1.6;color:#713f12}
.reflect-card .rc-text strong{color:#92400e}
.reflect-card .rc-answer{display:none;margin-top:10px;padding-top:10px;border-top:1px solid rgba(234,179,8,.3);font-style:italic;color:#92400e}
.reflect-card.open .rc-answer{display:block}

/* Narration expandable */
.lesson-body .narration{cursor:pointer;position:relative}
.lesson-body .narration .narr-expand{position:absolute;bottom:8px;right:12px;font-family:var(--ff-mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.35);transition:color .2s}
.lesson-body .narration:hover .narr-expand{color:rgba(255,255,255,.6)}
.lesson-body .narration.collapsed p:not(:first-of-type){display:none}
.lesson-body .narration.collapsed::after{content:'';position:absolute;bottom:0;left:0;right:0;height:40px;background:linear-gradient(transparent,#1e3a5f)}

/* Staggered entrance animation */
@keyframes blockEnter{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.lesson-body.animate>*{opacity:0;animation:blockEnter .4s ease forwards}
.lesson-body.animate>*:nth-child(1){animation-delay:.05s}
.lesson-body.animate>*:nth-child(2){animation-delay:.12s}
.lesson-body.animate>*:nth-child(3){animation-delay:.19s}
.lesson-body.animate>*:nth-child(4){animation-delay:.26s}
.lesson-body.animate>*:nth-child(5){animation-delay:.33s}
.lesson-body.animate>*:nth-child(6){animation-delay:.40s}
.lesson-body.animate>*:nth-child(7){animation-delay:.47s}
.lesson-body.animate>*:nth-child(8){animation-delay:.54s}
.lesson-body.animate>*:nth-child(n+9){animation-delay:.6s}

.lesson-body .checklist{list-style:none;margin:24px 0;padding:0}
.lesson-body .checklist li{display:flex;align-items:flex-start;gap:12px;padding:14px 18px;background:var(--card);border:1px solid #e5e7eb;margin-bottom:8px;font-size:16px;cursor:pointer;transition:all .2s;user-select:none}
.lesson-body .checklist li:hover{background:#f8fafc;border-color:#cbd5e1}
.lesson-body .checklist li.checked{background:#f0fdf4;border-color:#86efac}
.lesson-body .checklist li .ck-box{width:22px;height:22px;border:2px solid #cbd5e1;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:1px}
.lesson-body .checklist li.checked .ck-box{background:var(--green);border-color:var(--green)}
.lesson-body .checklist li.checked .ck-box::after{content:'';width:6px;height:10px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg);margin-top:-2px}

.lesson-body .tabs{margin:28px 0}
.lesson-body .tab-btns{display:flex;gap:0;border-bottom:2px solid #e5e7eb;margin-bottom:0}
.lesson-body .tab-btn{padding:12px 24px;font-size:15px;font-weight:600;color:var(--mute);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;font-family:var(--ff-display);transition:color .2s}
.lesson-body .tab-btn.active{color:var(--navy);border-bottom-color:var(--red)}
.lesson-body .tab-panel{display:none;padding:20px 0;font-size:16px;line-height:1.8}
.lesson-body .tab-panel.active{display:block}

.lesson-body .accordion-lesson{margin:24px 0}
.lesson-body .acc-item{border:1px solid #e5e7eb;margin-bottom:8px}
.lesson-body .acc-trigger{width:100%;padding:16px 20px;background:#fff;border:none;text-align:left;font-family:var(--ff-display);font-size:16px;font-weight:600;color:var(--navy);cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:12px;transition:background .15s}
.lesson-body .acc-trigger:hover{background:#f8fafc}
.lesson-body .acc-trigger .acc-chevron{transition:transform .2s;flex-shrink:0}
.lesson-body .acc-trigger.open .acc-chevron{transform:rotate(180deg)}
.lesson-body .acc-body{display:none;padding:0 20px 16px;font-size:15px;line-height:1.8;color:#444}
.lesson-body .acc-trigger.open+.acc-body{display:block}

.lesson-body .quiz-inline{background:#f8fafc;border:2px solid #e5e7eb;padding:28px;margin:28px 0;position:relative}
.lesson-body .quiz-inline::before{content:'Teste seu conhecimento';position:absolute;top:-12px;left:20px;background:#f8fafc;padding:0 10px;font-family:var(--ff-mono);font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--red);font-weight:700}
.lesson-body .quiz-inline .qi-title{font-family:var(--ff-mono);font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:var(--mute);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.lesson-body .quiz-inline .qi-question{font-size:17px;font-weight:600;margin-bottom:20px;color:var(--navy)}
.lesson-body .quiz-inline .qi-option{display:block;padding:14px 18px;margin-bottom:8px;border:1px solid #e5e7eb;background:#fff;cursor:pointer;font-size:16px;transition:all .15s;font-family:var(--ff-display)}
.lesson-body .quiz-inline .qi-option:hover{border-color:var(--navy);background:#f0f4ff}
.lesson-body .quiz-inline .qi-option.correct{background:#f0fdf4;border-color:var(--green);color:#166534}
.lesson-body .quiz-inline .qi-option.wrong{background:#fef2f2;border-color:#ef4444;color:#991b1b}
.lesson-body .quiz-inline .qi-option.disabled{pointer-events:none;opacity:.7}
.lesson-body .quiz-inline .qi-feedback{display:none;padding:14px 18px;margin-top:14px;font-size:15px;line-height:1.6}
.lesson-body .quiz-inline .qi-feedback.show{display:block}
.lesson-body .quiz-inline .qi-feedback.ok{background:#f0fdf4;border-left:4px solid var(--green);color:#166534}
.lesson-body .quiz-inline .qi-feedback.nok{background:#fef2f2;border-left:4px solid #ef4444;color:#991b1b}

.lesson-body .progress-visual{margin:28px 0}
.lesson-body .pv-bar{background:#e5e7eb;height:10px;overflow:hidden;margin-bottom:8px}
.lesson-body .pv-fill{background:var(--green);height:100%;transition:width .6s ease}
.lesson-body .pv-label{font-family:var(--ff-mono);font-size:13px;color:var(--mute)}

.lesson-body .step-flow{margin:28px 0;counter-reset:stepcount}
.lesson-body .step-item{display:flex;gap:20px;margin-bottom:20px;position:relative}
.lesson-body .step-item::before{counter-increment:stepcount;content:counter(stepcount);width:36px;height:36px;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0;font-family:var(--ff-mono)}
.lesson-body .step-item:not(:last-child)::after{content:'';position:absolute;left:17px;top:40px;bottom:-16px;width:2px;background:#e5e7eb}
.lesson-body .step-content{padding-top:6px;font-size:16px;line-height:1.7}
.lesson-body .step-content strong{color:var(--navy)}

.lesson-body .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin:28px 0}
.lesson-body .kpi-card{background:#fff;border:1px solid #e5e7eb;padding:24px 20px;text-align:center}
.lesson-body .kpi-card .kpi-value{font-size:34px;font-weight:700;color:var(--navy);font-family:var(--ff-mono)}
.lesson-body .kpi-card .kpi-label{font-size:13px;color:var(--mute);margin-top:6px}

.lesson-body .comparison{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:28px 0;border:1px solid #e5e7eb}
.lesson-body .comp-col{padding:24px}
.lesson-body .comp-col:first-child{border-right:1px solid #e5e7eb}
.lesson-body .comp-col.bad{background:#fef2f2}
.lesson-body .comp-col.good{background:#f0fdf4}
.lesson-body .comp-col h4{font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.lesson-body .comp-col.bad h4{color:#dc2626}
.lesson-body .comp-col.good h4{color:var(--green)}
.lesson-body .comp-col ul{margin:0;padding:0 0 0 20px;font-size:15px;line-height:1.7}

/* Template card */
.template-card{background:linear-gradient(135deg,#0b1730,#1e3a5f);color:#fff;padding:24px 28px;margin:28px 0;display:flex;align-items:center;gap:20px}
.template-card svg{flex-shrink:0}
.template-card .tc-text{flex:1}
.template-card .tc-text strong{display:block;font-size:17px;margin-bottom:4px}
.template-card .tc-text span{font-size:13px;color:rgba(255,255,255,.6);font-family:var(--ff-mono)}

/* Interaction hint */
.interact-hint{display:flex;align-items:center;gap:8px;font-family:var(--ff-mono);font-size:11px;color:var(--mute);text-transform:uppercase;letter-spacing:.08em;margin:16px 0 8px;animation:hintPulse 2s infinite}
@keyframes hintPulse{0%,100%{opacity:.5}50%{opacity:1}}

@media(max-width:640px){.lesson-body .comparison{grid-template-columns:1fr}.lesson-body .comp-col:first-child{border-right:none;border-bottom:1px solid #e5e7eb}.lesson-body .kpi-grid{grid-template-columns:1fr 1fr}}

/* ── Interactive enrichment components ── */
.reveal-card{margin:20px 0;border:1px solid #e2e8f0;border-radius:8px;overflow:hidden;background:#fff}
.reveal-trigger{display:flex;align-items:center;gap:10px;width:100%;padding:14px 18px;background:#f8fafc;border:none;cursor:pointer;font-family:var(--ff-display);font-size:15px;font-weight:600;color:var(--navy);transition:background .2s;text-align:left}
.reveal-trigger:hover{background:#eef2ff}
.reveal-trigger svg{color:#2563eb;flex-shrink:0}
.reveal-arrow{margin-left:auto;font-size:10px;transition:transform .3s;color:var(--mute)}
.reveal-body{max-height:0;overflow:hidden;transition:max-height .5s ease,padding .3s ease;padding:0 18px}
.reveal-card.open .reveal-body{max-height:400px;padding:14px 18px 18px}
.reveal-card.open .reveal-arrow{transform:rotate(180deg)}
.reveal-body p{font-size:15px;line-height:1.7;color:#475569;margin:0 0 8px}
.reveal-body p:last-child{margin:0}

.action-card{background:linear-gradient(135deg,#eff6ff,#dbeafe);border:1px solid #93c5fd;border-radius:10px;padding:22px 24px;margin:24px 0}
.action-header{display:flex;align-items:center;gap:10px;font-weight:700;font-size:14px;color:#1d4ed8;margin-bottom:12px;text-transform:uppercase;letter-spacing:.04em;font-family:var(--ff-mono)}
.action-header svg{color:#2563eb}
.action-card>p{font-size:15px;line-height:1.7;color:#1e3a5f;margin:0 0 14px}
.action-input{width:100%;padding:12px 16px;border:1px solid #93c5fd;border-radius:6px;font-family:var(--ff-display);font-size:14px;line-height:1.6;resize:vertical;background:#fff;color:var(--text);transition:border-color .2s}
.action-input:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.action-input::placeholder{color:#94a3b8}
.action-save{margin-top:10px;padding:8px 20px;background:#2563eb;color:#fff;border:none;cursor:pointer;font-family:var(--ff-display);font-size:13px;font-weight:600;border-radius:6px;transition:all .2s}
.action-save:hover{background:#1d4ed8}
.action-save.saved{background:var(--green)}

.flip-section{margin:28px 0}
.flip-header{display:flex;align-items:center;gap:10px;font-family:var(--ff-mono);font-size:13px;font-weight:600;color:var(--navy);margin-bottom:14px;text-transform:uppercase;letter-spacing:.05em}
.flip-header svg{color:var(--red)}
.flip-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px}
.flip-card{perspective:600px;cursor:pointer;height:130px}
.flip-inner{position:relative;width:100%;height:100%;transition:transform .6s cubic-bezier(.4,.2,.2,1);transform-style:preserve-3d}
.flip-card.flipped .flip-inner{transform:rotateY(180deg)}
.flip-front,.flip-back{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:14px;border-radius:10px;backface-visibility:hidden;text-align:center;line-height:1.4}
.flip-front{background:var(--navy);color:#fff;font-weight:700;font-size:16px}
.flip-front::after{content:'clique para revelar';position:absolute;bottom:8px;font-size:10px;font-family:var(--ff-mono);opacity:.35;font-weight:400;letter-spacing:.03em}
.flip-back{background:#f0fdf4;color:#166534;border:2px solid #86efac;transform:rotateY(180deg);font-size:13px;line-height:1.5;padding:12px}

strong.key-term{cursor:pointer;position:relative;border-bottom:2px dashed rgba(37,99,235,.3);transition:all .2s;padding:1px 3px;border-radius:3px}
strong.key-term:hover{background:rgba(37,99,235,.08)}
strong.key-term.highlighted{background:#dbeafe;border-bottom-color:#2563eb;border-bottom-style:solid}

.reminder-card{display:flex;align-items:center;gap:14px;padding:12px 18px;margin:16px 0;background:#fffbeb;border:1px solid #fde68a;border-radius:8px;transition:all .3s}
.reminder-card.remembered{background:#f0fdf4;border-color:#86efac}
.reminder-icon{width:32px;height:32px;background:#fbbf24;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.reminder-card.remembered .reminder-icon{background:var(--green)}
.reminder-icon svg{color:#78350f}
.reminder-card.remembered .reminder-icon svg{color:#fff}
.reminder-text{flex:1;font-size:13px;color:#92400e;line-height:1.5}
.reminder-card.remembered .reminder-text{color:#166534}
.reminder-btn{padding:6px 14px;border:1px solid #f59e0b;background:transparent;color:#b45309;cursor:pointer;font-family:var(--ff-mono);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;border-radius:4px;transition:all .2s;white-space:nowrap}
.reminder-btn:hover{background:#fef3c7}
.reminder-card.remembered .reminder-btn{border-color:var(--green);color:var(--green);background:#f0fdf4}

.case-card{background:linear-gradient(135deg,#ecfdf5,#d1fae5);border:1px solid #6ee7b7;border-radius:10px;overflow:hidden;margin:24px 0}
.case-trigger{display:flex;align-items:center;gap:10px;width:100%;padding:14px 18px;background:transparent;border:none;cursor:pointer;font-family:var(--ff-display);font-size:15px;font-weight:600;color:#065f46;text-align:left;transition:background .2s}
.case-trigger:hover{background:rgba(16,185,129,.08)}
.case-trigger svg{color:#059669;flex-shrink:0}
.case-trigger .reveal-arrow{margin-left:auto;color:#6ee7b7}
.case-body{max-height:0;overflow:hidden;transition:max-height .5s ease,padding .3s ease;padding:0 18px}
.case-card.open .case-body{max-height:400px;padding:4px 18px 18px}
.case-card.open .case-trigger .reveal-arrow{transform:rotate(180deg)}
.case-body p{font-size:14px;line-height:1.7;color:#065f46;margin:0}

.tip-card{display:flex;gap:14px;padding:16px 20px;margin:20px 0;background:linear-gradient(135deg,#fefce8,#fef9c3);border:1px solid #fde68a;border-left:4px solid #f59e0b;border-radius:0 8px 8px 0;align-items:flex-start}
.tip-card svg{flex-shrink:0;color:#d97706;margin-top:2px}
.tip-card p{font-size:14px;line-height:1.7;color:#92400e;margin:0}
.tip-card strong{color:#78350f}

.self-assess{background:linear-gradient(135deg,#faf5ff,#f3e8ff);border:1px solid #d8b4fe;border-radius:12px;padding:20px 24px;margin:28px 0;text-align:center}
.assess-header{font-weight:700;font-size:15px;color:#6b21a8;margin-bottom:16px}
.assess-options{display:flex;justify-content:center;gap:12px;margin-bottom:8px}
.assess-btn{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 20px;background:#fff;border:2px solid #e9d5ff;border-radius:10px;cursor:pointer;transition:all .2s;font-family:var(--ff-display);min-width:90px}
.assess-btn:hover{border-color:#a855f7;background:#faf5ff}
.assess-btn.selected{border-color:#a855f7;background:#f3e8ff;transform:scale(1.05)}
.assess-emoji{font-size:26px;line-height:1}
.assess-btn span:last-child{font-size:11px;font-weight:600;color:#7c3aed}
.assess-feedback{font-size:14px;line-height:1.6;color:#6b21a8;padding:12px 16px;background:rgba(168,85,247,.08);border-radius:8px;display:none;margin-top:8px}
.assess-feedback.show{display:block}

.table-interactive{margin:24px 0}
.table-hint{display:flex;align-items:center;gap:8px;font-family:var(--ff-mono);font-size:11px;color:var(--mute);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.table-hint svg{color:#2563eb}
tr.row-highlight td{background:#dbeafe !important;transition:background .2s}

@media(max-width:640px){.flip-grid{grid-template-columns:1fr 1fr}.flip-card{height:110px}.assess-options{flex-wrap:wrap;gap:8px}.assess-btn{min-width:70px;padding:10px 14px}.action-card{padding:16px 18px}}

/* Final exam */
.exam-container{max-width:720px;margin:0 auto;padding:40px 24px 60px}
.exam-header{text-align:center;margin-bottom:32px}
.exam-header h1{font-size:28px;font-weight:700;color:var(--navy);margin-bottom:8px}
.exam-header p{color:var(--mute);font-size:15px}
.exam-info{display:flex;gap:24px;justify-content:center;margin-top:16px;font-family:var(--ff-mono);font-size:12px;color:var(--mute)}
.exam-info span{background:#f1f5f9;padding:6px 14px;border-radius:4px}
.exam-progress{text-align:center;font-family:var(--ff-mono);font-size:13px;color:var(--mute);padding:8px;background:#f1f5f9;margin-bottom:24px;position:sticky;top:0;z-index:5}
.exam-question{background:var(--card);padding:28px;margin-bottom:20px;border:1px solid #e5e7eb}
.exam-question .eq-num{font-family:var(--ff-mono);font-size:12px;color:var(--red);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;font-weight:600}
.exam-question .eq-text{font-size:17px;font-weight:600;color:var(--navy);margin-bottom:20px;line-height:1.5}
.exam-question label{display:flex;align-items:flex-start;gap:12px;padding:14px 18px;margin-bottom:8px;border:1px solid #e5e7eb;background:#fff;cursor:pointer;font-size:16px;transition:all .15s}
.exam-question label:hover{border-color:var(--navy);background:#f0f4ff}
.exam-question label.selected{border-color:var(--navy);background:#eef2ff}
.exam-question label.correct{background:#f0fdf4;border-color:var(--green)}
.exam-question label.wrong{background:#fef2f2;border-color:#ef4444}
.exam-question input[type=radio]{margin-top:3px;accent-color:var(--navy)}
.exam-submit{text-align:center;margin-top:32px}
.exam-submit button{padding:16px 40px;background:var(--red);color:#fff;border:none;cursor:pointer;font-weight:700;font-size:16px;font-family:var(--ff-display);transition:background .2s}
.exam-submit button:hover{background:#a52e32}
.exam-submit button:disabled{opacity:.4;cursor:default}
.exam-result{text-align:center;padding:40px;margin:32px 0}
.exam-result.passed{background:#f0fdf4;border:2px solid var(--green)}
.exam-result.failed{background:#fef2f2;border:2px solid #ef4444}
.exam-result h2{font-size:24px;margin-bottom:8px}
.exam-result .score{font-family:var(--ff-mono);font-size:40px;font-weight:700;margin:12px 0}
.exam-result.passed .score{color:var(--green)}
.exam-result.failed .score{color:#ef4444}
.exam-result p{color:var(--mute);font-size:15px;margin-bottom:16px}
.exam-result .btn-cert{display:inline-block;padding:14px 32px;background:var(--green);color:#fff;text-decoration:none;font-weight:700;font-size:15px;margin-top:8px}
.exam-result .btn-retry{padding:14px 32px;background:var(--navy);color:#fff;border:none;cursor:pointer;font-weight:700;font-size:15px;font-family:var(--ff-display);margin-top:8px}
.eq-explanation{display:none;padding:12px 18px;margin-top:8px;font-size:14px;line-height:1.6;background:#fffbeb;border-left:3px solid #eab308;color:#713f12}
.eq-explanation.show{display:block}

.loading{text-align:center;padding:80px 24px;color:var(--mute);font-size:16px}
.toast{position:fixed;bottom:24px;right:24px;background:var(--navy);color:#fff;padding:12px 20px;font-size:14px;opacity:0;transition:opacity .3s;z-index:100}
.toast.show{opacity:1}

@media(max-width:768px){
  .sidebar{position:fixed;left:-320px;top:0;bottom:0;z-index:50;transition:left .3s;box-shadow:4px 0 20px rgba(0,0,0,.15)}
  .sidebar.open{left:0}
  .sidebar-toggle{display:block}
  .lesson-header{padding:16px 20px 0}
  .slide-viewport{padding:16px 20px 24px}
  .player-header .course-title{max-width:120px}
  .slide-dots{display:none}
}

</head>
<body>
<header class="player-header">
  <div class="left">
    <button class="sidebar-toggle" id="sidebarToggle" aria-label="Menu">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <a href="/ead/meus-cursos" class="brand"><img src="/assets/logo-horizontal-white.png" alt="Anders Tech"></a>
    <span class="course-title" id="courseTitle"></span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="right"><a href="/ead/meus-cursos">Meus cursos</a></div>
</header>

<div class="player-body">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main-content" id="mainContent">
    <div class="loading">Carregando...</div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  var slug=window.location.pathname.split('/').pop();
  var sidebar=document.getElementById('sidebar');
  var main=document.getElementById('mainContent');
  var courseData=null;
  var currentLessonId=null;
  var slides=[];
  var slideIdx=0;
  var keyHandler=null;
  var showSlideFunc=null;

  window.addEventListener('pageshow',function(e){if(e.persisted)window.location.reload()});
  function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},3000)}

  document.getElementById('sidebarToggle').addEventListener('click',function(){sidebar.classList.toggle('open')});

  fetch('/ead/api/player/'+slug).then(function(r){
    if(r.status===403){window.location.href='/ead/checkout/'+slug;return}
    if(r.status===401){window.location.href='/ead/login';return}
    return r.json();
  }).then(function(data){
    if(!data||!data.course)return;
    courseData=data;
    document.getElementById('courseTitle').textContent=data.course.titulo;
    document.title=data.course.titulo+' — Anders Tech EAD';
    renderSidebar();
    var firstLesson=null;
    var allDone=true;
    for(var m=0;m<data.modules.length;m++){
      var aulas=data.modules[m].aulas||[];
      for(var a=0;a<aulas.length;a++){
        if(!firstLesson)firstLesson=aulas[a].id;
        if(!aulas[a].completed){allDone=false;loadLesson(aulas[a].id);return}
      }
    }
    if(allDone&&new URLSearchParams(window.location.search).get('exam')==='1'){
      loadFinalExam();
    }else if(firstLesson){loadLesson(firstLesson);}
  }).catch(function(){main.innerHTML='<div class="loading">Erro ao carregar curso.</div>'});

  function renderSidebar(){
    var html='';
    var totalLessons=0,completedLessons=0;
    courseData.modules.forEach(function(m,i){
      var isOpen=false;
      var lessons='';
      (m.aulas||[]).forEach(function(l){
        totalLessons++;
        if(l.completed)completedLessons++;
        if(l.id===currentLessonId)isOpen=true;
        lessons+='<div class="lesson-link'+(l.id===currentLessonId?' active':'')+'" data-id="'+l.id+'">'
          +'<span class="check'+(l.completed?' done':'')+'"></span>'
          +'<span>'+l.titulo+'</span>'
          +'<span class="dur">'+(l.duracao||'')+'</span></div>';
      });
      html+='<div class="mod-header'+(isOpen||i===0?' open':'')+'" onclick="this.classList.toggle(\'open\')">Módulo '+(i+1)+': '+m.titulo+'<span>'+(m.aulas?m.aulas.length:0)+' aulas</span></div>'
        +'<div class="mod-lessons"'+(isOpen||i===0?' style="display:block"':'')+'>'+lessons+'</div>';
    });
    sidebar.innerHTML=html;
    if(totalLessons)document.getElementById('progressFill').style.width=Math.round(completedLessons/totalLessons*100)+'%';
    sidebar.querySelectorAll('.lesson-link').forEach(function(el){
      el.addEventListener('click',function(){loadLesson(parseInt(el.dataset.id));sidebar.classList.remove('open')});
    });
  }

  function allLessonsComplete(){
    if(!courseData||!courseData.modules)return false;
    for(var m=0;m<courseData.modules.length;m++){
      var aulas=courseData.modules[m].aulas||[];
      for(var a=0;a<aulas.length;a++){
        if(!aulas[a].completed)return false;
      }
    }
    return courseData.modules.length>0;
  }

  function loadFinalExam(){
    if(keyHandler){document.removeEventListener('keydown',keyHandler);keyHandler=null}
    currentLessonId=null;
    renderSidebar();
    main.style.overflow='auto';
    main.innerHTML='<div class="loading" style="padding-top:120px">Carregando prova final...</div>';
    fetch('/ead/api/quiz/'+slug+'?final=1').then(function(r){
      if(!r.ok)throw new Error();
      return r.json();
    }).then(function(data){
      var questions=data.questions;
      if(!questions||!questions.length){
        main.innerHTML='<div class="exam-container"><div class="exam-header"><h1>Prova Final</h1><p>Nenhuma pergunta disponível para este curso ainda.</p></div></div>';
        return;
      }
      var html='<div class="exam-container">'
        +'<div class="exam-header"><h1>Prova Final</h1>'
        +'<p>'+courseData.course.titulo+'</p>'
        +'<div class="exam-info"><span>'+questions.length+' questões</span><span>Aprovação: 70%</span></div></div>'
        +'<div class="exam-progress" id="examProgress">0 / '+questions.length+' respondidas</div>';
      questions.forEach(function(q,i){
        var alts=Array.isArray(q.alternativas)?q.alternativas:JSON.parse(q.alternativas);
        html+='<div class="exam-question" data-qid="'+q.id+'">'
          +'<div class="eq-num">Questão '+(i+1)+'</div>'
          +'<div class="eq-text">'+q.pergunta+'</div>';
        alts.forEach(function(alt,j){
          html+='<label data-idx="'+j+'"><input type="radio" name="q'+q.id+'" value="'+j+'"><span>'+alt+'</span></label>';
        });
        html+='<div class="eq-explanation"></div></div>';
      });
      html+='<div class="exam-submit"><button id="examSubmit">Enviar respostas</button></div>'
        +'<div id="examResult" style="display:none"></div></div>';
      main.innerHTML=html;
      main.scrollTop=0;
      function updateProgress(){
        var count=main.querySelectorAll('.exam-question input:checked').length;
        var el=document.getElementById('examProgress');
        if(el)el.textContent=count+' / '+questions.length+' respondidas';
      }
      main.querySelectorAll('.exam-question label').forEach(function(lbl){
        lbl.addEventListener('click',function(){
          var q=lbl.closest('.exam-question');
          q.querySelectorAll('label').forEach(function(l){l.classList.remove('selected')});
          lbl.classList.add('selected');
          setTimeout(updateProgress,10);
        });
      });
      document.getElementById('examSubmit').addEventListener('click',function(){
        var answers={};
        var answered=0;
        main.querySelectorAll('.exam-question').forEach(function(q){
          var checked=q.querySelector('input:checked');
          if(checked){answers[q.dataset.qid]=parseInt(checked.value);answered++}
        });
        if(answered<questions.length){
          showToast('Responda todas as '+questions.length+' questões.');
          var firstUnanswered=null;
          main.querySelectorAll('.exam-question').forEach(function(q){
            if(!firstUnanswered&&!q.querySelector('input:checked'))firstUnanswered=q;
          });
          if(firstUnanswered)firstUnanswered.scrollIntoView({behavior:'smooth',block:'center'});
          return;
        }
        var btn=document.getElementById('examSubmit');
        btn.disabled=true;btn.textContent='Enviando...';
        fetch('/ead/api/quiz/'+slug+'/submit',{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({answers:answers,isFinal:true})
        }).then(function(r){return r.json()}).then(function(res){
          res.results.forEach(function(r){
            var q=main.querySelector('[data-qid="'+r.questionId+'"]');
            if(!q)return;
            q.querySelectorAll('label').forEach(function(lbl){
              lbl.querySelector('input').disabled=true;
              lbl.style.cursor='default';
              var idx=parseInt(lbl.dataset.idx);
              if(idx===r.correctAnswer)lbl.classList.add('correct');
              else if(lbl.classList.contains('selected')&&!r.correct)lbl.classList.add('wrong');
            });
            if(r.explicacao){
              var exp=q.querySelector('.eq-explanation');
              exp.textContent=r.explicacao;exp.classList.add('show');
            }
          });
          var rd=document.getElementById('examResult');
          rd.style.display='block';
          if(res.passed){
            showConfetti();
            rd.className='exam-result passed';
            rd.innerHTML='<h2>Aprovado!</h2>'
              +'<div class="score">'+Math.round(res.score)+'%</div>'
              +'<p>'+res.correct+' de '+res.total+' questões corretas</p>'
              +(res.certificateCode?'<a href="/ead/api/certificate/'+res.certificateCode+'" target="_blank" class="btn-cert">Baixar certificado (PDF)</a><br><a href="/ead/certificado/'+res.certificateCode+'" style="display:inline-block;margin-top:12px;color:var(--mute);font-size:13px">Verificar certificado</a>':'');
          }else{
            rd.className='exam-result failed';
            rd.innerHTML='<h2>Nota insuficiente</h2>'
              +'<div class="score">'+Math.round(res.score)+'%</div>'
              +'<p>Necessário 70% para aprovação ('+res.correct+'/'+res.total+' corretas). Revise o conteúdo e tente novamente.</p>'
              +'<button class="btn-retry" id="examRetry">Tentar novamente</button>';
            document.getElementById('examRetry').addEventListener('click',loadFinalExam);
          }
          rd.scrollIntoView({behavior:'smooth'});
          btn.style.display='none';
          var prog=document.getElementById('examProgress');
          if(prog)prog.style.display='none';
        }).catch(function(){
          btn.disabled=false;btn.textContent='Enviar respostas';
          showToast('Erro ao enviar. Tente novamente.');
        });
      });
    }).catch(function(){

  function splitSlides(html){
    if(!html)return['<p>Conteudo em producao.</p>'];
    html=html.replace(/^\s*<h2[^>]*>[\s\S]*?<\/h2>\s*/i,'');
    var sections=html.split(/(?=<h3[\s>])/i);
    sections=sections.filter(function(p){return p.trim().length>20});
    if(!sections.length)sections=[html];
    var final=[];
    var THRESH=2800;
    sections.forEach(function(sec){
      if(sec.length<=THRESH){final.push(sec);return}
      var blocks=sec.split(/(?=<(?:h3[\s>]|p>|p |ul[\s>]|ol[\s>]|blockquote[\s>]|table[\s>]|div class="))/i);
      var chunk='';
      blocks.forEach(function(blk){
        var isVisual=/^<div class="(?:diagram|kpi-grid|comparison|step-flow|narration|insight-box)"/i.test(blk);
        if(isVisual&&chunk.length<1200){chunk+=blk;return}
        if(chunk.length+blk.length>THRESH&&chunk.length>600){
          final.push(chunk);chunk=blk;
        }else{chunk+=blk}
      });
      if(chunk.trim().length>20)final.push(chunk);
    });
    // Merge de slides com pouco texto visivel (<500 chars) no vizinho
    var merged=[];
    final.forEach(function(sec){
      var txt=sec.replace(/<[^>]*>/g,' ').replace(/\s+/g,' ').trim();
      if(merged.length&&txt.length<500&&(merged[merged.length-1].length+sec.length)<=THRESH+1400){
        merged[merged.length-1]+=sec;
      }else{
        merged.push(sec);
      }
    });
    if(merged.length>=2){
      var firstTxt=merged[0].replace(/<[^>]*>/g,' ').replace(/\s+/g,' ').trim();
      if(firstTxt.length<500&&(merged[0].length+merged[1].length)<=THRESH+1400){
        merged[1]=merged[0]+merged[1];
        merged.shift();
      }
    }
    return merged.length?merged:[html];
  }

        }
      };

      showSlide(0);

  function getDiagramModal(){
    var modal=document.getElementById('diagramModal');
    if(modal)return modal;
    modal=document.createElement('div');
    modal.id='diagramModal';
    modal.className='diagram-modal';
    modal.innerHTML='<button class="dm-close" aria-label="Fechar">&times;</button><div class="dm-stage"></div><div class="dm-caption"></div>';
    modal.addEventListener('click',function(e){
      if(e.target===modal||e.target.classList.contains('dm-close'))modal.classList.remove('open');
    });
    document.addEventListener('keydown',function(e){
      if(e.key==='Escape')modal.classList.remove('open');
    });
    document.body.appendChild(modal);
    return modal;
  }

        title.className='diagram-title';
        title.textContent=capText;
        d.insertBefore(title,d.firstChild);
        cap.style.display='none';

      var zoomBtn=document.createElement('button');
      zoomBtn.className='diagram-zoom';
      zoomBtn.setAttribute('aria-label','Ampliar diagrama');

  function showConfetti(){
    var canvas=document.createElement('canvas');
    canvas.style.cssText='position:fixed;inset:0;pointer-events:none;z-index:9999';
    canvas.width=window.innerWidth;canvas.height=window.innerHeight;
    document.body.appendChild(canvas);
    var ctx=canvas.getContext('2d');
    var colors=['#c5383c','#2563eb','#16a34a','#eab308','#8b5cf6','#ec4899'];
    var pieces=[];
    for(var i=0;i<100;i++){
      pieces.push({x:canvas.width*.5+(Math.random()-.5)*300,y:canvas.height*.35,
        vx:(Math.random()-.5)*16,vy:-Math.random()*22-4,
        w:5+Math.random()*7,h:3+Math.random()*4,
        color:colors[Math.floor(Math.random()*colors.length)],
        rot:Math.random()*Math.PI*2,rv:(Math.random()-.5)*.3,life:1});
    }
    function frame(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      var alive=false;
      pieces.forEach(function(p){
        if(p.life<=0)return;alive=true;
        p.x+=p.vx;p.y+=p.vy;p.vy+=.45;p.rot+=p.rv;p.life-=.007;p.vx*=.99;
        ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);
        ctx.globalAlpha=Math.min(p.life*2,1);ctx.fillStyle=p.color;
        ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();
      });
      if(alive)requestAnimationFrame(frame);else canvas.remove();
    }
    requestAnimationFrame(frame);
  }

  function animateKpis(){
    main.querySelectorAll('.kpi-value').forEach(function(el){
      var text=el.textContent.trim();
      var match=text.match(/^([\d.,]+)(.*)$/);
      if(!match)return;
      var numStr=match[1];var suffix=match[2];
      var hasComma=numStr.indexOf(',')>=0;
      var target=parseFloat(numStr.replace(/\./g,'').replace(',','.'));
      if(isNaN(target))return;
      var startTime=null;
      function step(ts){
        if(!startTime)startTime=ts;
        var p=Math.min((ts-startTime)/1200,1);
        var e=1-Math.pow(1-p,3);
        var v=target*e;
        if(hasComma)el.textContent=v.toFixed(1).replace('.',',')+suffix;
        else el.textContent=Math.round(v).toLocaleString('pt-BR')+suffix;
        if(p<1)requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
    });
  }

      {keys:['nao conformidade','nao-conformidade','constatacao','nc maior','nc menor','classificar'],title:'Caso real: Construtora em Recife (PE)',text:'Uma construtora padronizou a redacao de NCs no formato criterio-evidencia-falha. As discussoes de "isso nao e NC" em reunioes de encerramento cairam 90%, e o tempo medio de tratamento de acao corretiva caiu de 45 para 18 dias, porque a causa ficou clara desde o registro.'},
      {keys:['relatorio de auditoria','follow-up','reuniao de encerramento','eficacia da acao'],title:'Caso real: Metalmecanica em Caxias do Sul (RS)',text:'Uma metalmecanica instituiu follow-up formal 60 dias apos cada auditoria interna. Antes, 40% das acoes corretivas "morriam" sem verificacao de eficacia. Depois de 2 ciclos, a reincidencia de NCs caiu de 35% para 8% — o follow-up virou a etapa mais valorizada do programa.'},
      {keys:['checklist','plano de auditoria','amostragem','analise documental','preparacao'],title:'Caso real: Hospital em Belo Horizonte (MG)',text:'A equipe de qualidade de um hospital passou a dedicar 2 horas de analise documental antes de cada auditoria interna. Os checklists ficaram direcionados aos riscos reais de cada setor e a duracao das auditorias caiu 30%, com o dobro de constatacoes relevantes.'},
      {keys:['sipoc','mapeamento de processo','entrada','saida','fornecedor interno'],title:'Caso real: Distribuidora em Uberlandia (MG)',text:'Uma distribuidora mapeou o processo de expedicao com SIPOC em um workshop de 4 horas com a propria equipe. Descobriram que 3 retrabalhos cronicos vinham de uma entrada mal definida (pedido sem horario de corte). Corrigida a interface, os erros de embarque cairam 62% em 3 meses.'},
      {keys:['fluxograma','swimlane','raia','desenho do processo','simbolo'],title:'Caso real: Seguradora em Porto Alegre (RS)',text:'Uma seguradora desenhou o fluxo de sinistros em swimlanes e descobriu que o processo cruzava 7 departamentos com 4 aprovacoes redundantes. Eliminando 2 raias e 3 handoffs, o tempo de resposta ao cliente caiu de 12 para 5 dias uteis — sem contratar ninguem.'},
      {keys:['leading','lagging','tendencia','balanced scorecard','bsc','dashboard'],title:'Caso real: Transportadora em Itajai (SC)',text:'Uma transportadora media so indicadores de resultado (entregas no prazo). Ao adicionar 3 indicadores de tendencia (manutencao preventiva em dia, horas de treinamento, checklist de saida), passou a agir ANTES do atraso acontecer. Pontualidade subiu de 87% para 96% em um semestre.'},
      {keys:['gargalo','lead time','tempo de ciclo','desperdicio','fila'],title:'Caso real: Grafica em Sao Bernardo (SP)',text:'Uma grafica cronometrou o lead time de orcamento e descobriu que 70% do tempo era fila na mesa de um unico aprovador. Criaram alcada de aprovacao ate R$ 5 mil para os vendedores: o prazo de resposta caiu de 3 dias para 4 horas e a taxa de conversao de orcamentos subiu 28%.'},
      {keys:['pop','procedimento operacional','instrucao de trabalho','padronizacao de processo'],title:'Caso real: Panificadora industrial em Fortaleza (CE)',text:'Uma panificadora industrial reescreveu 40 POPs com fotos e linguagem do chao de fabrica, validados pelos proprios operadores. O tempo de treinamento de novatos caiu pela metade e a variacao de peso do produto entre turnos praticamente desapareceu.'},
      {keys:['seiri','etiqueta vermelha','descarte','area de quarentena','senso de utilizacao'],title:'Caso real: Autopecas em Sorocaba (SP)',text:'No primeiro Seiri, uma fabrica de autopecas etiquetou 1.200 itens e liberou 180 m2 de area util — o equivalente a um barracao que iam alugar por R$ 8 mil/mes. A venda de sucata e equipamentos parados ainda gerou R$ 34 mil de caixa.'},
      {keys:['seiton','shadow board','enderecamento','um lugar para cada coisa','30 segundos','senso de organizacao'],title:'Caso real: Manutencao industrial em Joinville (SC)',text:'A equipe de manutencao implantou shadow boards e enderecamento de ferramentas. O tempo medio de busca caiu de 4 minutos para 30 segundos, e as compras duplicadas de ferramenta "sumida" (R$ 2 mil/mes) praticamente zeraram.'},
      {keys:['seiso','limpeza como inspecao','vazamento','anomalia','senso de limpeza'],title:'Caso real: Textil em Americana (SP)',text:'Ao adotar o Seiso como inspecao, os operadores de uma textil passaram a reportar vazamentos e folgas durante a limpeza diaria de 10 minutos. As quebras nao programadas de teares cairam 43% em 6 meses — antes mesmo de qualquer investimento em manutencao preditiva.'},
      {keys:['seiketsu','estado padrao','foto do padrao','gestao visual','senso de padronizacao'],title:'Caso real: Alimentos em Marilia (SP)',text:'Uma fabrica de alimentos fixou fotos do "estado padrao" em cada posto de trabalho. A pergunta da auditoria virou "esta igual a foto?" — simples o suficiente para qualquer pessoa responder. A nota media das auditorias 5S subiu de 62% para 91% em 4 meses.'},
      {keys:['shitsuke','disciplina','auditoria 5s','habito','sustentacao'],title:'Caso real: Plasticos em Manaus (AM)',text:'Uma fabrica de plasticos manteve auditorias 5S quinzenais por 18 meses, com resultados expostos em quadro e reconhecimento simbolico por area. Quando a auditoria virou rotina esperada (e nao fiscalizacao), o 5S sobreviveu a troca de 2 gerentes e virou cultura — o teste real do Shitsuke.'},
      {keys:['dia d','cinco sensos','implantacao do 5s','faxina'],title:'Caso real: Metalurgica em Contagem (MG)',text:'Uma metalurgica fez o Dia D do 5S com producao parada, 100% do efetivo envolvido e diretoria presente de uniforme. Custo total: R$ 2.400 em materiais e um dia de producao. Em contrapartida, o "antes e depois" fotografico engajou a equipe de um jeito que 3 anos de campanhas de cartaz nunca conseguiram.'}
    ];
    var TIPS=[
      {keys:['processo'],tip:'Comece mapeando seus 3 processos mais criticos antes de tentar documentar tudo. Foco no que impacta diretamente o cliente.'},
      {keys:['documento','documentacao','informacao documentada'],tip:'A ISO 9001:2015 fala em "informacao documentada", nao em "manual da qualidade". Documente o necessario, nao o burocratico.'},
      {keys:['auditoria','auditor'],tip:'Auditor interno bom faz perguntas abertas: "Me mostre como voce faz..." revela muito mais que "Voce segue o procedimento?".'},
      {keys:['risco','riscos'],tip:'Use a matriz Probabilidade x Impacto para priorizar. Nem todo risco precisa de plano de acao — alguns basta monitorar.'},
      {keys:['indicador','kpi','medicao'],tip:'Indicador bom e aquele que gera acao. Se ninguem faz nada quando o numero muda, repense se vale a pena medir.'},
      {keys:['melhoria','acao corretiva'],tip:'Registre TODAS as oportunidades de melhoria, mesmo as pequenas. As maiores inovacoes vem de sugestoes simples do operacional.'},
      {keys:['cliente','satisfacao'],tip:'Pesquisa de satisfacao so funciona se voce fecha o ciclo: feedback negativo, implementa acao, comunica ao cliente o que mudou.'},
      {keys:['lideranca','alta direcao'],tip:'Lideranca na ISO 9001 nao e so "dar apoio". E demonstrar comprometimento com acoes visiveis: participar, decidir, alocar recursos.'},
      {keys:['competencia','treinamento'],tip:'Mantenha uma matriz de competencias atualizada. Ela mostra gaps antes que virem problemas em auditoria ou na operacao.'},
      {keys:['qualidade','sgq'],tip:'SGQ nao e projeto com inicio e fim — e a forma como a empresa opera. Quando vira rotina, para de ser "mais uma coisa pra fazer".'},
      {keys:['fornecedor'],tip:'Avalie fornecedores com criterios objetivos (prazo, qualidade, preco). Mantenha um ranking e compartilhe os resultados com eles.'},
      {keys:['nao conformidade','desvio','problema'],tip:'Nao-conformidade nao e "erro de alguem" — e oportunidade de melhoria do sistema. Trate a causa raiz, nao o sintoma.'},
      {keys:['checklist','plano de auditoria','analise documental'],tip:'Monte o checklist a partir da analise documental previa, nao de um modelo generico. Checklist bom aponta para os riscos reais daquele processo.'},
      {keys:['entrevista','pergunta aberta','auditado'],tip:'Na entrevista de auditoria, prefira "Me mostre como voce faz" a "Voce segue o procedimento?". Evidencia vale mais que resposta ensaiada.'},
      {keys:['constatacao','nc maior','nc menor','classificar'],tip:'Toda constatacao de NC precisa de 3 elementos: o criterio descumprido, a evidencia objetiva e a explicacao da falha. Faltou um, a NC e fragil.'},
      {keys:['follow-up','eficacia','reincidencia'],tip:'Acao corretiva sem verificacao de eficacia e promessa, nao correcao. Agende o follow-up no momento em que a acao for aprovada.'},
      {keys:['reuniao de abertura','reuniao de encerramento'],tip:'Na reuniao de encerramento, nenhuma NC deve ser surpresa. Alinhe cada constatacao com o auditado durante a auditoria, nao no final.'},
      {keys:['sipoc','mapeamento de processo'],tip:'Faca o SIPOC com quem executa o processo, nao sozinho na sala. O mapa "oficial" quase nunca e o processo real.'},
      {keys:['fluxograma','swimlane','raia'],tip:'No fluxograma, cada losango de decisao e um ponto potencial de fila e retrabalho. Conte quantos handoffs entre raias existem — cada um e um risco de erro.'},
      {keys:['leading','lagging','tendencia'],tip:'Combine indicadores de resultado (lagging) com indicadores de tendencia (leading). O primeiro conta o que aconteceu; o segundo deixa voce agir antes.'},
      {keys:['gargalo','lead time','fila'],tip:'Antes de acelerar qualquer etapa, descubra onde o trabalho fica PARADO. Na maioria dos processos, 80% do lead time e espera, nao execucao.'},
      {keys:['seiri','etiqueta vermelha','descarte'],tip:'No Seiri, na duvida etiquete. A area de quarentena de 30 dias existe justamente para decidir sem medo de jogar fora o que faz falta.'},
      {keys:['seiton','shadow board','30 segundos'],tip:'Teste o Seiton com a regra dos 30 segundos: chame alguem de outro setor e peca para encontrar um item. Se demorar mais, o enderecamento ainda nao esta visual.'},
      {keys:['seiso','limpeza','anomalia'],tip:'Trate a limpeza como inspecao: ao limpar, o operador procura vazamento, folga e desgaste. Anomalia encontrada no Seiso e manutencao preventiva gratis.'},
      {keys:['seiketsu','estado padrao','foto'],tip:'Fotografe o estado padrao de cada area e fixe no local. A auditoria vira uma pergunta que qualquer pessoa responde: "esta igual a foto?".'},
      {keys:['shitsuke','disciplina','auditoria 5s'],tip:'Disciplina nao se cria com cobranca, mas com rotina: auditorias curtas e frequentes, resultado visivel e reconhecimento. Constancia vale mais que rigor.'},
      {keys:['dia d','implantacao do 5s'],tip:'O Dia D nao e o 5S — e so o pontape. Sem Seiketsu e Shitsuke planejados para a semana seguinte, em 30 dias tudo volta ao estado anterior.'}
    ];

    function findMatch(arr,text){
      var best=null,bestScore=0;
      arr.forEach(function(item){
        var score=0;
        item.keys.forEach(function(k){
          var re=new RegExp(k,'gi');var m=text.match(re);
          if(m)score+=m.length;
        });
        if(score>bestScore){bestScore=score;best=item}
      });
      return bestScore>=1?best:null;
    }

    // 1. KEY TERM HIGHLIGHTS
    sc.querySelectorAll('p strong, li strong').forEach(function(s){
      if(s.closest('.reveal-card,.action-card,.reminder-card,.callout,.insight-box,.narration,.template-box,.quiz-inline,.case-card,.tip-card'))return;
      var term=s.textContent.trim();
      if(term.length<3||term.length>60)return;
      s.classList.add('key-term');
      s.setAttribute('tabindex','0');
      s.addEventListener('click',function(){s.classList.toggle('highlighted')});
    });

    // 2. REVEAL CARDS after KPI grids
    sc.querySelectorAll('.kpi-grid').forEach(function(kg){
      var card=document.createElement('div');
      card.className='reveal-card';
      card.innerHTML='<button class="reveal-trigger"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg> Por que esses numeros importam?<span class="reveal-arrow">&#9660;</span></button>'
        +'<div class="reveal-body"><p>Esses indicadores mostram a relevancia global do tema que voce esta estudando. Reflita: <strong>como sua empresa se posiciona</strong> nesse cenario?</p><p>Entender o contexto macro ajuda a justificar investimentos internos e a mostrar para a direcao o valor de implementar boas praticas.</p></div>';
      kg.after(card);
    });

    // 3. CASE STUDY CARD
    var caseMatch=findMatch(CASES,slideText);
    if(caseMatch&&idx>0&&!hasInteractive(content)){
      var cc=document.createElement('div');
      cc.className='case-card';
      cc.innerHTML='<button class="case-trigger"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg> '+caseMatch.title+'<span class="reveal-arrow">&#9660;</span></button>'
        +'<div class="case-body"><p>'+caseMatch.text+'</p></div>';
      sc.appendChild(cc);
    }

    // 4. ACTION CARD (apply in practice) - odd slides
    if(idx%2===1&&!hasInteractive(content)){
      var strongs=[];
      sc.querySelectorAll('p strong').forEach(function(s){
        if(s.closest('.callout,.insight-box,.narration,.template-box,.reveal-card,.action-card,.case-card,.tip-card'))return;
        var t=s.textContent.trim();
        if(t.length>=4&&t.length<=50)strongs.push(t);
      });
      if(strongs.length){
        var topic=strongs[0];
        var prompts=[
          'Liste 3 exemplos de <strong>'+topic+'</strong> na realidade da sua empresa ou do seu dia a dia.',
          'Como <strong>'+topic+'</strong> impacta o trabalho da sua equipe? Descreva uma situacao real que voce ja vivenciou.',
          'Se voce precisasse explicar <strong>'+topic+'</strong> para um colega novo, o que diria em 3 frases?',
          'Que acoes praticas voce pode tomar esta semana relacionadas a <strong>'+topic+'</strong>?'
        ];
        var ac=document.createElement('div');
        ac.className='action-card';
        ac.innerHTML='<div class="action-header"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg> Aplique na pratica</div>'
          +'<p>'+prompts[idx%prompts.length]+'</p>'
          +'<textarea class="action-input" placeholder="Escreva aqui sua resposta..." rows="3"></textarea>'
          +'<button class="action-save">Salvar anotacao</button>';
        sc.appendChild(ac);
      }
    }

    // 5. FLIP CARDS - key terms quiz
    if(idx%3===0&&idx>0){
      var terms=[];
      sc.querySelectorAll('p').forEach(function(p){
        if(p.closest('.callout,.insight-box,.narration,.template-box,.reveal-card,.action-card,.case-card,.tip-card'))return;
        p.querySelectorAll('strong').forEach(function(s){
          var term=s.textContent.trim();
          var ctx=p.textContent.trim();
          if(term.length>=4&&term.length<=40&&ctx.length>term.length+30){
            var sentences=ctx.split(/[.!?]+/);
            var relevant=sentences.find(function(st){return st.toLowerCase().indexOf(term.toLowerCase())>=0});
            if(relevant&&relevant.trim().length>15)terms.push({term:term,def:relevant.trim()});
          }
        });
      });
      if(terms.length>=2){
        var flipHtml='<div class="flip-section"><div class="flip-header"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="18" rx="2"/><path d="M2 12h20"/></svg> Teste seu conhecimento</div><div class="flip-grid">';
        terms.slice(0,4).forEach(function(t){
          flipHtml+='<div class="flip-card"><div class="flip-inner"><div class="flip-front">'+t.term+'</div><div class="flip-back">'+t.def+'</div></div></div>';
        });
        flipHtml+='</div></div>';
        var flipEl=document.createElement('div');
        flipEl.innerHTML=flipHtml;
        sc.appendChild(flipEl.firstElementChild);
      }
    }

    // 6. PRACTICAL TIP - even slides
    if(idx%2===0){
      var tipMatch=findMatch(TIPS,slideText);
      if(tipMatch){
        var tip=document.createElement('div');
        tip.className='tip-card';
        tip.innerHTML='<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 1 1 7.072 0l-.548.547A3.374 3.374 0 0 0 14 18.469V19a2 2 0 1 1-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>'
          +'<p><strong>Dica pratica:</strong> '+tipMatch.tip+'</p>';
        sc.appendChild(tip);
      }
    }

    // 7. SELF-ASSESSMENT - every 3rd slide
    if(idx>0&&idx%3===2){
      var assess=document.createElement('div');
      assess.className='self-assess';
      assess.innerHTML='<div class="assess-header">Como voce se sente sobre este conteudo?</div>'
        +'<div class="assess-options">'
        +'<button class="assess-btn" data-level="1"><span class="assess-emoji">&#128533;</span><span>Confuso</span></button>'
        +'<button class="assess-btn" data-level="2"><span class="assess-emoji">&#129300;</span><span>Entendendo</span></button>'
        +'<button class="assess-btn" data-level="3"><span class="assess-emoji">&#128170;</span><span>Dominei!</span></button>'
        +'</div>'
        +'<div class="assess-feedback"></div>';
      sc.appendChild(assess);
    }

    // 8. REMINDER after callouts
    sc.querySelectorAll('.callout').forEach(function(callout){
      var txt=callout.querySelector('strong');
      if(!txt)return;
      var card=document.createElement('div');
      card.className='reminder-card';
      card.innerHTML='<div class="reminder-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg></div>'
        +'<div class="reminder-text">Ponto importante — marque para revisar depois</div>'
        +'<button class="reminder-btn">Lembrar</button>';
      callout.after(card);
    });

    // 9. TABLE INTERACTIVITY
    sc.querySelectorAll('table').forEach(function(table){
      if(table.closest('.template-box'))return;
      if(table.parentElement&&table.parentElement.classList.contains('table-interactive'))return;
      var wrapper=document.createElement('div');
      wrapper.className='table-interactive';
      var hint=document.createElement('div');
      hint.className='table-hint';
      hint.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg> Clique nas linhas para destacar';
      table.parentNode.insertBefore(wrapper,table);
      wrapper.appendChild(hint);
      wrapper.appendChild(table);
      table.querySelectorAll('tr').forEach(function(tr){
        if(tr.querySelector('th'))return;
        tr.style.cursor='pointer';
        tr.addEventListener('click',function(){tr.classList.toggle('row-highlight')});
      });
    });

    // 10. INSIGHT BOXES clickable
    sc.querySelectorAll('.insight-box').forEach(function(ib){
      ib.style.cursor='pointer';
      ib.addEventListener('click',function(){
        if(ib.style.borderLeftColor==='rgb(22, 163, 74)'){ib.style.borderLeftColor='';ib.style.background=''}
        else{ib.style.borderLeftColor='#16a34a';ib.style.background='#f0fdf4'}
      });
    });

    // --- EVENT HANDLERS ---
    // Reveal cards
    sc.querySelectorAll('.reveal-trigger').forEach(function(btn){
      btn.addEventListener('click',function(){
        var card=btn.closest('.reveal-card');
        card.classList.toggle('open');
        var arrow=btn.querySelector('.reveal-arrow');
        if(arrow)arrow.innerHTML=card.classList.contains('open')?'&#9650;':'&#9660;';
      });
    });
    // Case cards
    sc.querySelectorAll('.case-trigger').forEach(function(btn){
      btn.addEventListener('click',function(){
        var card=btn.closest('.case-card');
        card.classList.toggle('open');
        var arrow=btn.querySelector('.reveal-arrow');
        if(arrow)arrow.innerHTML=card.classList.contains('open')?'&#9650;':'&#9660;';
      });
    });
    // Flip cards
    sc.querySelectorAll('.flip-card').forEach(function(fc){
      fc.addEventListener('click',function(){fc.classList.toggle('flipped')});
    });
    // Action save with localStorage
    sc.querySelectorAll('.action-save').forEach(function(btn){
      btn.addEventListener('click',function(){
        var ta=btn.previousElementSibling;
        if(ta&&ta.value.trim()){
          btn.textContent='Salvo!';btn.classList.add('saved');
          setTimeout(function(){btn.textContent='Salvar anotacao';btn.classList.remove('saved')},2000);
          try{localStorage.setItem('ead_note_'+currentLessonId+'_'+idx,ta.value)}catch(e){}
        }
      });
    });
    // Load saved notes
    sc.querySelectorAll('.action-input').forEach(function(ta){
      try{var saved=localStorage.getItem('ead_note_'+currentLessonId+'_'+idx);if(saved)ta.value=saved}catch(e){}
    });
    // Reminder
    sc.querySelectorAll('.reminder-btn').forEach(function(btn){
      btn.addEventListener('click',function(){
        var card=btn.closest('.reminder-card');
        card.classList.toggle('remembered');
        btn.textContent=card.classList.contains('remembered')?'Lembrado!':'Lembrar';
      });
    });
    // Self-assessment
    sc.querySelectorAll('.assess-btn').forEach(function(btn){
      btn.addEventListener('click',function(){
        var assess=btn.closest('.self-assess');
        assess.querySelectorAll('.assess-btn').forEach(function(b){b.classList.remove('selected')});
        btn.classList.add('selected');
        var fb=assess.querySelector('.assess-feedback');
        var level=parseInt(btn.dataset.level);
        var msgs={1:'Sem problema! Releia o conteudo acima com calma. Se a duvida persistir, anote e retome depois com mais contexto.',2:'Bom progresso! A pratica vai consolidar. Tente o exercicio "Aplique na pratica" para fixar.',3:'Excelente! Voce esta pronto para avancar. Aproveite o conhecimento e compartilhe com colegas.'};
        fb.textContent=msgs[level]||'';
        fb.classList.add('show');
      });
    });
  }

  // Touch swipe navigation
  var swipeStartX=0,swipeStartY=0;
  document.addEventListener('touchstart',function(e){
    swipeStartX=e.changedTouches[0].screenX;
    swipeStartY=e.changedTouches[0].screenY;
  },{passive:true});
  document.addEventListener('touchend',function(e){
    var dx=e.changedTouches[0].screenX-swipeStartX;
    var dy=e.changedTouches[0].screenY-swipeStartY;
    if(Math.abs(dx)<60||Math.abs(dy)>Math.abs(dx))return;
    if(dx>0&&slideIdx>0&&showSlideFunc){showSlideFunc(slideIdx-1)}
    else if(dx<0&&slideIdx<slides.length-1&&showSlideFunc){showSlideFunc(slideIdx+1)}
  },{passive:true});
})();
</script>
