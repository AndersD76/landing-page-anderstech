<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Curso — Anders Tech EAD</title>
<link rel="icon" href="/assets/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--navy:#0b1730;--red:#c5383c;--bg:#f4f5f7;--card:#fff;--text:#1a1a2e;--mute:#6b7280;--green:#16a34a;--ff-display:'Space Grotesk',sans-serif;--ff-mono:'JetBrains Mono',monospace}
body{font-family:var(--ff-display);background:var(--bg);color:var(--text)}
.ead-header{background:var(--navy);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.ead-header .left{display:flex;align-items:center;gap:16px}
.ead-header a.brand{color:#fff;text-decoration:none;font-weight:600;font-size:18px;display:flex;align-items:center;gap:10px}
.ead-header img{height:56px}
.ead-header .tag{font-family:var(--ff-mono);font-size:11px;color:rgba(255,255,255,.5);letter-spacing:.08em;text-transform:uppercase}
.ead-header .right a{color:rgba(255,255,255,.7);text-decoration:none;font-size:14px;padding:8px 16px}

.hero-course{background:var(--navy);color:#fff;padding:60px 24px 50px}
.hero-course .wrap{max-width:900px;margin:0 auto}
.hero-course .breadcrumb{font-size:13px;color:rgba(255,255,255,.5);margin-bottom:16px}
.hero-course .breadcrumb a{color:rgba(255,255,255,.6);text-decoration:none}
.hero-course h1{font-size:clamp(24px,3.5vw,36px);font-weight:700;margin-bottom:12px;line-height:1.2}
.hero-course .sub{font-size:16px;color:rgba(255,255,255,.7);margin-bottom:20px;line-height:1.5}
.hero-course .meta{display:flex;gap:20px;flex-wrap:wrap;font-family:var(--ff-mono);font-size:13px;color:rgba(255,255,255,.6);margin-bottom:24px}
.hero-course .cta-row{display:flex;gap:16px;align-items:center;flex-wrap:wrap}
.hero-course .price{font-size:32px;font-weight:700}
.hero-course .price-old{font-size:16px;color:rgba(255,255,255,.5);text-decoration:line-through;margin-right:8px}
.video-frame{position:relative;width:100%;max-width:720px;margin:0 auto;aspect-ratio:16/9;background:#0b1730;box-shadow:0 8px 32px rgba(11,23,48,.18)}
.video-frame iframe{position:absolute;inset:0;width:100%;height:100%}
.btn-buy{padding:14px 32px;background:var(--red);color:#fff;text-decoration:none;font-weight:700;font-size:16px;display:inline-block;transition:background .2s}
.btn-buy:hover{background:#a52e32}
.btn-enrolled{padding:14px 32px;background:var(--green);color:#fff;text-decoration:none;font-weight:700;font-size:16px}

.wrap{max-width:900px;margin:0 auto;padding:0 24px}
.content-section{padding:40px 0}
.content-section h2{font-size:22px;font-weight:700;margin-bottom:24px;padding-bottom:12px;border-bottom:2px solid #eee}

.module-accordion{margin-bottom:16px;background:var(--card);box-shadow:0 1px 6px rgba(0,0,0,.06)}
.module-header{padding:18px 20px;cursor:pointer;display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:16px;user-select:none}
.module-header h3{font-size:16px;font-weight:600;margin:0}
.module-header .count{font-family:var(--ff-mono);font-size:12px;color:var(--mute);text-align:right}
.module-header .chevron{width:20px;height:20px;transition:transform .3s;color:var(--mute)}
.module-header.open .chevron{transform:rotate(180deg)}
.module-lessons{display:none;border-top:1px solid #eee}
.module-lessons.show{display:block}
.lesson-item{padding:12px 20px 12px 40px;font-size:14px;display:grid;grid-template-columns:1fr auto;align-items:center;gap:12px;border-bottom:1px solid #f5f5f5}
.lesson-item:last-child{border-bottom:none}
.lesson-item .dur{font-family:var(--ff-mono);font-size:12px;color:var(--mute);white-space:nowrap;text-align:right}
.lesson-item .tpl{font-size:11px;color:var(--green);margin-left:8px}

.features{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:32px}
.feature{display:flex;gap:10px;align-items:flex-start;font-size:14px;line-height:1.5}
.feature svg{flex:none;color:var(--green);margin-top:2px}

.ead-footer{background:var(--navy);color:rgba(255,255,255,.5);text-align:center;padding:24px;font-size:13px;margin-top:60px}
.ead-footer a{color:rgba(255,255,255,.7);text-decoration:none}
.loading{text-align:center;padding:60px;color:var(--mute)}
.promo-banner{background:linear-gradient(135deg,#16a34a 0%,#15803d 100%);color:#fff;padding:14px 24px;text-align:center;font-size:14px;font-weight:600}
.promo-banner b{font-family:var(--ff-mono);letter-spacing:.05em}
.price-free{font-size:32px;font-weight:700;color:#16a34a}
.price-was{font-size:16px;color:rgba(255,255,255,.5);text-decoration:line-through;margin-right:8px}
.btn-free{padding:14px 32px;background:#16a34a;color:#fff;text-decoration:none;font-weight:700;font-size:16px;display:inline-block;transition:background .2s}
.btn-free:hover{background:#15803d}
.cta-card{background:linear-gradient(135deg,#0b1730 0%,#162a52 100%);color:#fff;padding:40px 32px;text-align:center;max-width:480px;margin:0 auto}
.cta-card-paid{background:var(--card);color:var(--text);box-shadow:0 2px 16px rgba(0,0,0,.08)}
.cta-card-badge{font-family:var(--ff-mono);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#4ade80;margin-bottom:20px}
.cta-card-prices{display:flex;align-items:baseline;justify-content:center;gap:12px;margin-bottom:24px}
.price-was-dark{font-size:16px;color:var(--mute);text-decoration:line-through}
.price-free-lg{font-size:40px;font-weight:700;color:#4ade80}
.price-lg{font-size:36px;font-weight:700;color:var(--navy);margin-bottom:20px}
.btn-free-lg{padding:16px 48px;font-size:18px;display:inline-block;border:none;cursor:pointer}
.btn-buy-lg{padding:16px 48px;font-size:18px;display:inline-block}
.cta-card-sub{font-size:13px;color:rgba(255,255,255,.5);margin-top:16px}
.cta-card-paid .cta-card-sub{color:var(--mute)}
@media(max-width:640px){.features{grid-template-columns:1fr}.cta-card{padding:32px 20px}}
</style>
</head>
<body>
<header class="ead-header">
  <div class="left">
    <a href="/" class="brand"><img src="/assets/logo-horizontal-white.png" alt="Anders Tech"></a>
    <span class="tag">Cursos EAD</span>
  </div>
  <div class="right">
    <a href="/ead/cursos">Todos os cursos</a>
    <a href="/ead/login" id="navAuth">Entrar</a>
  </div>
</header>

<div id="promoBanner"></div>
<div id="courseContent">
  <div class="loading">Carregando curso...</div>
</div>

<footer class="ead-footer">
  <p>&copy; 2026 Anders Tech &middot; <a href="/">anderstech.net</a></p>
</footer>

<script>
(function(){
  var slug=window.location.pathname.split('/').pop();
  if(!slug){window.location.href='/ead/cursos';return}

  function fmt(v){return 'R$ '+Number(v).toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.')}

  fetch('/ead/api/me').then(function(r){if(r.ok)return r.json();return null}).then(function(u){
    if(u)document.getElementById('navAuth').outerHTML='<a href="/ead/meus-cursos">Meus cursos</a>';
  }).catch(function(){});

  fetch('/ead/api/promo').then(function(r){return r.json()}).then(function(p){
    if(p.ativa){document.getElementById('promoBanner').innerHTML='<div class="promo-banner"><b>LANÇAMENTO:</b> Acesso gratuito a todos os cursos até '+new Date(p.fim).toLocaleDateString('pt-BR')+'. Matricule-se agora!</div>'}
  }).catch(function(){});

  fetch('/ead/api/courses/'+slug).then(function(r){return r.json()}).then(function(c){
    if(!c.id){document.getElementById('courseContent').innerHTML='<div class="loading">Curso não encontrado.</div>';return}
    document.title=c.titulo+' — Anders Tech EAD';
    var totalAulas=0;
    if(c.modules)c.modules.forEach(function(m){if(m.aulas)totalAulas+=m.aulas.length});

    var ctaHtml='', ctaBottomHtml='';
    if(c.enrolled){
      ctaHtml='<a href="/ead/player/'+c.slug+'" class="btn-enrolled">Acessar curso</a>';
      ctaBottomHtml=ctaHtml;
    }else if(c.promo_gratuito){
      ctaHtml='<span class="price-was">'+fmt(c.preco)+'</span>'
        +'<span class="price-free">Grátis</span>'
        +'<a href="/ead/checkout/'+c.slug+'" class="btn-free">Matricular grátis</a>';
      ctaBottomHtml='<div class="cta-card">'
        +'<div class="cta-card-badge">Lançamento — acesso gratuito</div>'
        +'<div class="cta-card-prices"><span class="price-was-dark">'+fmt(c.preco)+'</span><span class="price-free-lg">Grátis</span></div>'
        +'<a href="/ead/checkout/'+c.slug+'" class="btn-free btn-free-lg">Matricular grátis agora</a>'
        +'<p class="cta-card-sub">Acesso vitalício. Sem cartão. Sem compromisso.</p></div>';
    }else{
      ctaHtml=(c.preco_original?'<span class="price-old">'+fmt(c.preco_original)+'</span>':'')
        +'<span class="price">'+fmt(c.preco)+'</span>'
        +'<a href="/ead/checkout/'+c.slug+'" class="btn-buy">Comprar agora</a>';
      ctaBottomHtml='<div class="cta-card cta-card-paid">'
        +(c.preco_original?'<div class="price-was-dark">'+fmt(c.preco_original)+'</div>':'')
        +'<div class="price-lg">'+fmt(c.preco)+'</div>'
        +'<a href="/ead/checkout/'+c.slug+'" class="btn-buy btn-buy-lg">Comprar agora</a>'
        +'<p class="cta-card-sub">Pagamento seguro via Mercado Pago. Certificado incluso.</p></div>';
    }

    var modulesHtml='';
    if(c.modules)c.modules.forEach(function(m,i){
      var lessons='';
      if(m.aulas)m.aulas.forEach(function(l){
        lessons+='<div class="lesson-item"><span>'+l.titulo+(l.entregavel_titulo?'<span class="tpl">'+l.entregavel_titulo+'</span>':'')+'</span>'
          +'<span class="dur">'+(l.duracao||'')+'</span></div>';
      });
      modulesHtml+='<div class="module-accordion">'
        +'<div class="module-header'+(i===0?' open':'')+'" data-accordion>'
        +'<h3>Módulo '+(i+1)+': '+m.titulo+'</h3>'
        +'<span class="count">'+(m.aulas?m.aulas.length:0)+' aulas</span>'
        +'<svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>'
        +'</div>'
        +'<div class="module-lessons'+(i===0?' show':'')+'">'+lessons+'</div></div>';
    });

    // Vídeos de apresentação (HeyGen) por slug de curso — adicionar os demais quando gerados
    var COURSE_VIDEOS={
      'iso-9001-2015-interpretacao':'https://app.heygen.com/embeds/3d98a061aade4f3fb91158e803a98c05',
      'auditor-interno-iso-9001':'https://app.heygen.com/embeds/bfae7cc3d70f4df09d3e53d4b42a35b0'
    };
    var videoHtml='';
    if(COURSE_VIDEOS[c.slug]){
      videoHtml='<section class="content-section"><h2>Conheça o curso em 40 segundos</h2>'
        +'<div class="video-frame"><iframe src="'+COURSE_VIDEOS[c.slug]+'" title="Apresentação do curso" frameborder="0" allow="encrypted-media; fullscreen;" allowfullscreen loading="lazy"></iframe></div>'
        +'</section>';
    }

    document.getElementById('courseContent').innerHTML=
      '<section class="hero-course"><div class="wrap">'
      +'<div class="breadcrumb"><a href="/ead/cursos">Cursos</a> / '+c.titulo+'</div>'
      +'<h1>'+c.titulo+'</h1>'
      +'<p class="sub">'+(c.subtitulo||'')+'</p>'
      +'<div class="meta"><span>'+c.carga_horaria+'</span><span>'+(c.modules?c.modules.length:0)+' módulos</span><span>'+totalAulas+' aulas</span><span>Certificado incluso</span></div>'
      +'<div class="cta-row">'+ctaHtml+'</div>'
      +'</div></section>'
      +'<div class="wrap">'
      +videoHtml
      +'<section class="content-section">'
      +'<h2>O que você vai aprender</h2>'
      +'<p style="font-size:15px;line-height:1.7;color:var(--mute);margin-bottom:28px">'+(c.objetivo||c.descricao||'')+'</p>'
      +'<div class="features">'
      +'<div class="feature"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg><span>Templates e ferramentas baixáveis</span></div>'
      +'<div class="feature"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg><span>Casos reais anonimizados da indústria</span></div>'
      +'<div class="feature"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg><span>Quiz por módulo + avaliação final</span></div>'
      +'<div class="feature"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg><span>Certificado de conclusão</span></div>'
      +'<div class="feature"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg><span>Acesso vitalício ao conteúdo</span></div>'
      +'<div class="feature"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg><span>Linguagem prática, sem academicismo</span></div>'
      +'</div></section>'
      +'<section class="content-section"><h2>Conteúdo do curso</h2>'+modulesHtml+'</section>'
      +'<section class="content-section" style="text-align:center;padding:40px 0 48px">'
      +ctaBottomHtml
      +'</section></div>';

    document.querySelectorAll('[data-accordion]').forEach(function(header){
      header.addEventListener('click',function(){
        header.classList.toggle('open');
        var lessons=header.nextElementSibling;
        if(lessons)lessons.classList.toggle('show');
      });
    });
  }).catch(function(){
    document.getElementById('courseContent').innerHTML='<div class="loading">Erro ao carregar curso.</div>';
  });
})();
</script>
</body>
</html>
