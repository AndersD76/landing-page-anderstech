<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Página não encontrada — Anders Tech</title>
<meta name="robots" content="noindex, nofollow" />
<link rel="stylesheet" href="/styles.css">
<link rel="icon" href="/assets/favicon.png" type="image/png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
<div id="shared-nav"></div>

<section style="min-height:60vh;display:flex;align-items:center;justify-content:center;background:var(--paper);padding:80px 24px">
  <div style="text-align:center;max-width:520px">
    <div style="font-family:var(--ff-mono);font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:var(--red);margin-bottom:24px;display:inline-flex;align-items:center;gap:9px">
      <span style="width:7px;height:7px;background:var(--red);transform:rotate(45deg);display:inline-block"></span> ERRO 404
    </div>
    <h1 style="font-family:var(--ff-display);font-size:clamp(36px,5vw,56px);font-weight:600;color:var(--navy);letter-spacing:-.03em;line-height:1.1;margin-bottom:16px">Página não encontrada</h1>
    <p style="color:var(--ink-soft);font-size:17px;line-height:1.7;margin-bottom:36px">O endereço que você acessou não existe ou foi movido. Use os links abaixo para voltar à navegação.</p>
    <div style="display:flex;flex-wrap:wrap;gap:14px;justify-content:center">
      <a href="/" class="btn btn-red"><span>Voltar ao início</span></a>
      <a href="/blog" class="btn btn-out" style="border-color:var(--line);color:var(--navy)"><span>Ver conteúdo</span></a>
      <a href="/#contato" class="btn btn-out" style="border-color:var(--line);color:var(--navy)"><span>Falar conosco</span></a>
    </div>
  </div>
</section>

<div id="shared-footer"></div>
<script src="/shared.js"></script>
</body>
</html>
